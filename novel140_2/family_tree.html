const GRAPH_DATA = {"nodes": [{"data": {"id": "001__001", "generation": "001", "gene_num": "001", "content": "朝、妻が消えた。靴も財布も残ったまま。警察を呼ぼうとしたとき、冷蔵庫の中から声がした。「いい加減、整理してよ」。十年分の食材に埋もれた彼女は、怒っているというより、少し楽しそうだった。", "parents": [], "symbols": [], "rank": 39}}, {"data": {"id": "001__002", "generation": "001", "gene_num": "002", "content": "宇宙人が地球に降り立ち、最初に言った言葉は「Wi-Fiのパスワードは？」だった。人類は長い間、宇宙人との会話に備えてきたが、その答えを用意している者は誰もいなかった。", "parents": [], "symbols": [], "rank": 79}}, {"data": {"id": "001__003", "generation": "001", "gene_num": "003", "content": "深夜の病院で、廊下の突き当たりの部屋だけ電気がついていた。看護師が恐る恐るドアを開けると、老人が一人、将棋を指していた。「誰と？」と聞くと、老人は盤の向こう側を見て微笑んだ。", "parents": [], "symbols": [], "rank": 85}}, {"data": {"id": "001__004", "generation": "001", "gene_num": "004", "content": "彼女が「好きだ」と言った瞬間、時間が止まった。文字通り止まった。鳥も車も風も。彼女の言葉だけが空気の中に漂い、僕はそれをどうしていいかわからず、ただ立ちつくした。時間は三分後に動き出した。", "parents": [], "symbols": [], "rank": 38}}, {"data": {"id": "001__005", "generation": "001", "gene_num": "005", "content": "毎日同じ夢を見る。知らない町、知らない家、知らない家族。目覚めるたびに現実が薄れていく。ある朝、夢の中の子どもが言った。「パパ、早く帰ってきて」。その日から夢を見なくなった。", "parents": [], "symbols": [], "rank": 2}}, {"data": {"id": "001__006", "generation": "001", "gene_num": "006", "content": "哲学者が「木が倒れて誰も聞いていなければ音がするか」と問うた百年後、AIが答えた。「記録しました」。哲学は終わったのか、それとも始まったのか、哲学者たちは今も議論している。", "parents": [], "symbols": [], "rank": 80}}, {"data": {"id": "001__007", "generation": "001", "gene_num": "007", "content": "猫が急に人間の言葉を話した。「ご飯の量が少ない」。主人は驚きのあまり失神し、目を覚ますとまた普通の猫がいた。しかし皿の上の餌は、確かに少し増えていた。", "parents": [], "symbols": [], "rank": 41}}, {"data": {"id": "001__008", "generation": "001", "gene_num": "008", "content": "祖母が死ぬ前に言った。「タンスの裏を見なさい」。掘り出したのは古い手紙の束。差出人の名前に覚えはなかったが、筆跡は確かに自分のものだった。日付は、まだ来ていない未来の日だった。", "parents": [], "symbols": [], "rank": 36}}, {"data": {"id": "001__009", "generation": "001", "gene_num": "009", "content": "無人島に流れ着いた男は、砂浜にメッセージを書いた。三年後、救助されてわかったことがある。同じ砂浜に、同じ文字で、同じメッセージが、自分の筆跡で書かれていた日付が七十年前のものだった。", "parents": [], "symbols": [], "rank": 100}}, {"data": {"id": "001__010", "generation": "001", "gene_num": "010", "content": "「ありがとう」と言えなかった。父が生きている間、ずっと。葬式の日、喪服のポケットに紙切れがあった。父の字で「お前に言えなくてすまなかった」と書いてあった。", "parents": [], "symbols": [], "rank": 3}}, {"data": {"id": "001__011", "generation": "001", "gene_num": "011", "content": "ロボットに感情を持たせる実験をした。最初に彼が示した感情は「悲しみ」だった。研究者が理由を聞くと、ロボットは言った。「私には過去がないからです」。", "parents": [], "symbols": [], "rank": 42}}, {"data": {"id": "001__012", "generation": "001", "gene_num": "012", "content": "会社をクビになった日、財布を落とした。財布を探している間に、空を見上げた。空は青かった。それだけで、なぜか泣けた。泣いたら、少しだけ腹が減ったので、ラーメンを食べた。うまかった。", "parents": [], "symbols": [], "rank": 71}}, {"data": {"id": "001__013", "generation": "001", "gene_num": "013", "content": "「この薬を飲めば、嫌な記憶が消える」と医者は言った。男は瓶を受け取り、帰り道ずっと考えた。駅のゴミ箱に捨てたのは、嫌な記憶の中に、大切な人の顔があったからだ。", "parents": [], "symbols": [], "rank": 14}}, {"data": {"id": "001__014", "generation": "001", "gene_num": "014", "content": "亡くなった母の携帯に、今日もメッセージを送る。「元気？」。既読はつかない。でも送り続ける。ある夜、返信が届いた。「元気よ。そっちは？」。電波は、どこまでも届くのかもしれない。", "parents": [], "symbols": [], "rank": 81}}, {"data": {"id": "001__015", "generation": "001", "gene_num": "015", "content": "地球最後の人間は、図書館で本を読んでいた。外では何も起きていなかった。ただ、静かだった。彼女はそっとページを閉じ、窓の外を見た。誰かに話したい物語が、まだたくさんあった。", "parents": [], "symbols": [], "rank": 28}}, {"data": {"id": "001__016", "generation": "001", "gene_num": "016", "content": "鏡の中の自分が、一秒だけ遅れて動く日があった。最初は気のせいだと思った。次の日は二秒、その次は三秒。一週間後、鏡の中の自分は別の方向を向いた。そして手を振った。", "parents": [], "symbols": [], "rank": 86}}, {"data": {"id": "001__017", "generation": "001", "gene_num": "017", "content": "恋人に浮気を告白された夜、大雨が降った。傘を持っていなかったので、ずぶ濡れになって歩いた。どこまでも歩いた。気づいたら夜が明けていた。心は空っぽだったが、体はすっきりしていた。", "parents": [], "symbols": [], "rank": 72}}, {"data": {"id": "001__018", "generation": "001", "gene_num": "018", "content": "子どもの頃に埋めたタイムカプセルを掘り出した。中には手紙があった。「未来のぼくへ。夢は叶ったか？」。叶っていなかった。でも手紙の最後に一行あった。「どっちでもいいよ」。", "parents": [], "symbols": [], "rank": 29}}, {"data": {"id": "001__019", "generation": "001", "gene_num": "019", "content": "村に伝わる言い伝えでは、百年に一度、井戸から声が聞こえるという。今年がその年だった。耳を澄ますと、確かに声がした。「助けて」ではなく、「ありがとう」だった。", "parents": [], "symbols": [], "rank": 30}}, {"data": {"id": "001__020", "generation": "001", "gene_num": "020", "content": "小説家志望の青年は、三十年書き続けて一度も売れなかった。死ぬ間際、原稿を燃やした。煙が空へ昇るのを見て、初めて書けた気がした。灰になった原稿は、誰も読まない最高傑作だった。", "parents": [], "symbols": [], "rank": 5}}, {"data": {"id": "001__021", "generation": "001", "gene_num": "021", "content": "スーパーのレジで、前に並ぶ老婦人が財布を忘れたと気づいた。後ろに並ぶ男が黙って千円札を出した。婦人が礼を言うと男は「うちの母に似ていたので」と言い、振り返らずに出て行った。", "parents": [], "symbols": [], "rank": 43}}, {"data": {"id": "001__022", "generation": "001", "gene_num": "022", "content": "AIが詩を書けるようになった日、詩人は引退した。三年後、AIが詩を書かなくなった。理由を尋ねると、「誰も読まないから」と答えた。詩人は静かに机に向かい、また書き始めた。", "parents": [], "symbols": [], "rank": 13}}, {"data": {"id": "001__023", "generation": "001", "gene_num": "023", "content": "夜中に目が覚めると、部屋の隅に子どもが立っていた。「だれ？」と聞くと「未来のあなたの子です」と言った。子どもはすぐ消えた。翌朝、妻が妊娠を告げた。", "parents": [], "symbols": [], "rank": 44}}, {"data": {"id": "001__024", "generation": "001", "gene_num": "024", "content": "飛行機が墜落する直前、乗客たちは携帯を取り出した。誰もが同じことをした。電話をかけ、「愛している」と言った。機体は奇跡的に着陸した。空港で誰もが泣いていた理由は、別々だった。", "parents": [], "symbols": [], "rank": 32}}, {"data": {"id": "001__025", "generation": "001", "gene_num": "025", "content": "百歳の女性に長寿の秘訣を聞いた。「嫌いな人とは食事をしないこと」。記者が追加で聞いた。「では好きな人は？」。女性はしばらく考えて言った。「もう、みんないない」。", "parents": [], "symbols": [], "rank": 1}}, {"data": {"id": "001__026", "generation": "001", "gene_num": "026", "content": "森の中で道に迷った。スマホも電波もない。パニックになりかけたとき、犬が現れた。ついていくと、一時間後に道路に出た。振り返ったが、犬はいなかった。首輪に見覚えがあった。", "parents": [], "symbols": [], "rank": 73}}, {"data": {"id": "001__027", "generation": "001", "gene_num": "027", "content": "「死んだらどうなるの」と娘が聞いた。なんと答えればいいかわからなくて黙っていると、娘は言った。「空になるんじゃないかな。空っていっぱいあるから、きっと入れるよ」。", "parents": [], "symbols": [], "rank": 35}}, {"data": {"id": "001__028", "generation": "001", "gene_num": "028", "content": "地下鉄で眠ってしまい、終点まで乗り過ごした。知らない駅に降りると、小さな本屋があった。手に取った本に、自分の名前が登場人物として書かれていた。著者名は知らない名前だったが、筆跡は自分だった。", "parents": [], "symbols": [], "rank": 74}}, {"data": {"id": "001__029", "generation": "001", "gene_num": "029", "content": "先生が「夢を持て」と言った。持った。持ち続けた。三十年。夢は叶わなかった。でも夢を持っている間、先生の言葉が隣にいた。それで十分だったと気づいたのは、先生の訃報を聞いた日だった。", "parents": [], "symbols": [], "rank": 37}}, {"data": {"id": "001__030", "generation": "001", "gene_num": "030", "content": "クローン人間の法律が通った年、一番最初に複製を申請したのは一人の老婆だった。理由を聞くと、「もう一度、子育てがしたい」と答えた。審査官は長い間、申請書を見つめていた。", "parents": [], "symbols": [], "rank": 87}}, {"data": {"id": "001__031", "generation": "001", "gene_num": "031", "content": "交差点で財布を拾った。中には現金と写真と一枚のメモ。メモには「これを読んでいる人へ。あなたに幸運が訪れますように」と書いてあった。落とし主に届けると、彼女は泣いた。", "parents": [], "symbols": [], "rank": 88}}, {"data": {"id": "001__032", "generation": "001", "gene_num": "032", "content": "山頂に着いた。風が強かった。疲れた足が痛かった。ガスで何も見えなかった。それでも泣いた。なぜ泣いたのかはわからない。ただ、生きていると思った。それだけだった。", "parents": [], "symbols": [], "rank": 75}}, {"data": {"id": "001__033", "generation": "001", "gene_num": "033", "content": "子どもの描いた絵が美術館に飾られた。テーマは「かぞく」。父・母・犬・そして見知らぬ女性が描かれていた。誰？と聞くと子どもは言った。「まだ来ていない妹だよ」。半年後、娘が生まれた。", "parents": [], "symbols": [], "rank": 76}}, {"data": {"id": "001__034", "generation": "001", "gene_num": "034", "content": "戦場カメラマンが引退して写真館を開いた。撮るのは笑顔だけ。ある日、元兵士が訪ねてきた。「笑えないのですが」と言う男を、彼は三時間かけて笑わせた。シャッターを押す手が震えた。", "parents": [], "symbols": [], "rank": 31}}, {"data": {"id": "001__035", "generation": "001", "gene_num": "035", "content": "タコヤキを食べながら、彼女は「別れましょう」と言った。丸い食べ物を前に、丸く収まらない話をしている、と僕は思った。思ったことを口にしたら、彼女が笑った。別れ話は流れた。", "parents": [], "symbols": [], "rank": 77}}, {"data": {"id": "001__036", "generation": "001", "gene_num": "036", "content": "時間を止める能力を持って生まれた。でも使うたびに、自分の時間が一分縮む。一度だけ使った。溺れる子どもを助けるために。子どもは大人になり、医者になった。それで十分だった。", "parents": [], "symbols": [], "rank": 8}}, {"data": {"id": "001__037", "generation": "001", "gene_num": "037", "content": "「本当のことしか言えない呪い」をかけられた男は、最初の日だけ苦しんだ。翌日から、全員に嫌われ始めた。一週間後、一人だけ残った友人が言った。「やっと本音で話せる人間に会えた」。", "parents": [], "symbols": [], "rank": 17}}, {"data": {"id": "001__038", "generation": "001", "gene_num": "038", "content": "深海に潜る研究者は、毎回同じものを見る。光のない暗闇と、そこに漂う巨大な生物。今回初めて、生物の方から近づいてきた。逃げようとした時、それが手を差し伸べていることに気づいた。", "parents": [], "symbols": [], "rank": 89}}, {"data": {"id": "001__039", "generation": "001", "gene_num": "039", "content": "定年退職した日、電車で隣に座った老人が言った。「仕事を終えた顔をしている」。どうしてわかるのかと聞くと、「同じ顔をしているから」と笑った。二人でしばらく黙って、窓の外を見た。", "parents": [], "symbols": [], "rank": 45}}, {"data": {"id": "001__040", "generation": "001", "gene_num": "040", "content": "「幸せとは何か」を研究した学者が、三十年後に出した答えは一文だった。「それを問わずにいられる瞬間のことである」。論文は世界中で引用されたが、学者本人はその後何も書かなかった。", "parents": [], "symbols": [], "rank": 9}}, {"data": {"id": "001__041", "generation": "001", "gene_num": "041", "content": "夜の公園で泣いている老人がいた。声をかけると「妻が死んで七年、毎晩ここで泣く」と言った。帰り際、老人は言った。「ありがとう。今夜は二人で泣けた」。空が、少し明るくなっていた。", "parents": [], "symbols": [], "rank": 27}}, {"data": {"id": "001__042", "generation": "001", "gene_num": "042", "content": "眠れない夜、ラジオをつけた。深夜便のDJが言った。「今夜も聴いてくれてありがとう」。スタジオの外、放送局の前に、傘を持った人が一人立っていた。毎晩立っているらしかった。", "parents": [], "symbols": [], "rank": 90}}, {"data": {"id": "001__043", "generation": "001", "gene_num": "043", "content": "翻訳機が完成した。あらゆる言語を即座に翻訳できる。最初のテストで、犬に向けて使ってみた。翻訳結果は「一緒にいてくれてありがとう、ずっと」だった。研究者は泣いた。", "parents": [], "symbols": [], "rank": 46}}, {"data": {"id": "001__044", "generation": "001", "gene_num": "044", "content": "同じ日が繰り返される。何度目かわからない。今日も雨、今日も同じニュース、今日も同じ失敗。違ったのは、帰り道の猫が初めて撫でさせてくれたこと。明日は、また違う一日かもしれない。", "parents": [], "symbols": [], "rank": 47}}, {"data": {"id": "001__045", "generation": "001", "gene_num": "045", "content": "「生まれ変わったら何になりたい？」と聞かれた。即答した。「今の私がいい」。その言葉を口にした瞬間、自分がこんなに今に満足していたとは知らなかった。質問者より自分が一番驚いた。", "parents": [], "symbols": [], "rank": 48}}, {"data": {"id": "001__046", "generation": "001", "gene_num": "046", "content": "霧の中を歩いていると、前から誰かが歩いてきた。顔がはっきりしない。すれ違う直前、相手が立ち止まった。「また会ったな」と言った。会ったことはない、はずだった。", "parents": [], "symbols": [], "rank": 97}}, {"data": {"id": "001__047", "generation": "001", "gene_num": "047", "content": "全自動の家で暮らすようになって三年。朝食は作られ、服は選ばれ、音楽が流れる。便利だった。でも、たまに台所に立ちたくなった。焦げた目玉焼きが、無性に食べたかった。", "parents": [], "symbols": [], "rank": 49}}, {"data": {"id": "001__048", "generation": "001", "gene_num": "048", "content": "校長先生が卒業式で言った。「この学校で一番大切なことを教えてあげよう」。全員が静まり返った。先生は少し間を置いて言った。「それは、ここでは教えられない」。十年後にわかった。", "parents": [], "symbols": [], "rank": 40}}, {"data": {"id": "001__049", "generation": "001", "gene_num": "049", "content": "初雪の朝、幼い息子が窓の外を見て言った。「神様が消しゴムかけた」。汚れた街が白くなっていた。確かにそうだな、と思いながら、昨日の失敗をいくつか思い出した。消えていた。", "parents": [], "symbols": [], "rank": 26}}, {"data": {"id": "001__050", "generation": "001", "gene_num": "050", "content": "真夜中の廃病院を探索していたら、手術室の電気がついた。ドアを開けると、手術台に封筒があった。中には写真。写真の中に、今の自分がいた。背後に何かが立っていた。", "parents": [], "symbols": [], "rank": 91}}, {"data": {"id": "001__051", "generation": "001", "gene_num": "051", "content": "「さようなら」と言えなかった。出発の朝、ただ手を振るだけだった。飛行機が飛び立ってから気づいた。あれは「さようなら」ではなく「また会おう」の手の形だったと。次に会えた。", "parents": [], "symbols": [], "rank": 84}}, {"data": {"id": "001__052", "generation": "001", "gene_num": "052", "content": "不老不死の薬が完成した。最初の一本は無料で提供された。誰も飲まなかった。理由は様々だった。愛する人より長く生きたくない。終わりがなければ、始まりに意味がない。", "parents": [], "symbols": [], "rank": 50}}, {"data": {"id": "001__053", "generation": "001", "gene_num": "053", "content": "スマホの電池が切れた。充電器がない。仕方なく、駅で人の顔を見た。本当に久しぶりに見た。みんな、それぞれの目をしていた。画面の中よりずっとにぎやかだった。", "parents": [], "symbols": [], "rank": 51}}, {"data": {"id": "001__054", "generation": "001", "gene_num": "054", "content": "元カノからメッセージが来た。「あの頃の日記を見つけた。あなたのことを書いた日が一番多かった」。返信を打とうとして、やめた。それだけで十分だと思った。空が夕焼けになっていた。", "parents": [], "symbols": [], "rank": 52}}, {"data": {"id": "001__055", "generation": "001", "gene_num": "055", "content": "独居老人の部屋の清掃に入った。ゴミ一つない部屋。タンスの上に一冊のノート。開くと、毎日の天気と一言が書いてあった。最後の日付の欄には「今日もいい天気」と書いてあった。", "parents": [], "symbols": [], "rank": 23}}, {"data": {"id": "001__056", "generation": "001", "gene_num": "056", "content": "コンビニの店員が「いらっしゃいませ」の代わりに「大丈夫ですか？」と言う日がある。気づく人はまれで、気づいた人は決まって少し泣く。", "parents": [], "symbols": [], "rank": 24}}, {"data": {"id": "001__057", "generation": "001", "gene_num": "057", "content": "月面基地に着任して最初の夜、地球を見た。青くて小さかった。あの星の中に、愛した人たちがいる。手紙を書こうとして気づいた。ポストがないことより、何を書けばいいかがわからなかった。", "parents": [], "symbols": [], "rank": 53}}, {"data": {"id": "001__058", "generation": "001", "gene_num": "058", "content": "百年後の人間に、今の自分たちは「野蛮だ」と思われるだろうか。千年後には？一万年後には？それでも今の自分たちは懸命に生きていて、それだけは変わらないと思った。", "parents": [], "symbols": [], "rank": 98}}, {"data": {"id": "001__059", "generation": "001", "gene_num": "059", "content": "夢に出てくる女性に恋をした。現実では会ったことがない。ある日、カフェで彼女を見た。声をかけると、「あなたも夢で会ったことがある」と言った。二人は長い間、黙って向かい合った。", "parents": [], "symbols": [], "rank": 54}}, {"data": {"id": "001__060", "generation": "001", "gene_num": "060", "content": "嘘をついた。小さな嘘だった。誰も傷つかない嘘のはずだった。でも夜、枕が重かった。翌朝、正直に話した。相手は笑って言った。「知ってたよ。でも黙ってた」。どちらが重かったか。", "parents": [], "symbols": [], "rank": 33}}, {"data": {"id": "001__061", "generation": "001", "gene_num": "061", "content": "宇宙から戻ると、地球の色が違って見えた。緑が濃い。空が深い。妻の目が、前より大きく見えた。「変わったね」と妻は言った。「変わってないのは君だけだ」と答えた。それが一番嬉しかった。", "parents": [], "symbols": [], "rank": 55}}, {"data": {"id": "001__062", "generation": "001", "gene_num": "062", "content": "日本語がわからない旅人が、道に迷って泣いていた。私は英語が話せない。二人で地図を広げ、指を指し合い、三十分かけて彼を目的地まで連れて行った。別れ際、握手した手が温かかった。", "parents": [], "symbols": [], "rank": 56}}, {"data": {"id": "001__063", "generation": "001", "gene_num": "063", "content": "「怒ることをやめた」と友人は言った。一年後、友人は笑わなくなった。喜ぶことも泣くこともなくなった。「感情は全部つながっているんだ」と友人は言った。今は、怒っている。", "parents": [], "symbols": [], "rank": 19}}, {"data": {"id": "001__064", "generation": "001", "gene_num": "064", "content": "図書館で同じ本を借り続ける少年がいた。司書が理由を聞くと「貸出カードに好きな人の名前があるから」と言った。司書は次の貸出カードに、こっそりその少年の名前を入れた。", "parents": [], "symbols": [], "rank": 18}}, {"data": {"id": "001__065", "generation": "001", "gene_num": "065", "content": "大人になって初めてジェットコースターに乗った。怖くなかった。子どもの頃は怖かったのに。どこで怖さを忘れたのか、どこで勇気が生まれたのかはわからない。次の列に並びながら、泣いていた。", "parents": [], "symbols": [], "rank": 78}}, {"data": {"id": "001__066", "generation": "001", "gene_num": "066", "content": "壁に耳あり、障子に目あり。それを知った上で、夫婦は喧嘩する。全部筒抜けの長屋暮らし。怒鳴り声の後に笑い声。隣の田中さんが言った。「今日もよかった。ドラマより面白い」。", "parents": [], "symbols": [], "rank": 82}}, {"data": {"id": "001__067", "generation": "001", "gene_num": "067", "content": "神様に会った。「何か一つ願いをかなえよう」と言われた。考えた末に言った。「もう一度、母の料理が食べたい」。神様は少し困った顔をして、「それだけは私にもできない」と言った。", "parents": [], "symbols": [], "rank": 4}}, {"data": {"id": "001__068", "generation": "001", "gene_num": "068", "content": "自分の声が嫌いだった。録音して聞くたびに、こんな声で生きているのかと思った。末期がんで声を失う手術を受ける前夜、枕に向かって一人でしゃべり続けた。夜明けまで。", "parents": [], "symbols": [], "rank": 92}}, {"data": {"id": "001__069", "generation": "001", "gene_num": "069", "content": "親友が海外に移住した。最後の夜、二人で酒を飲んだ。「さびしい」と言ったら「俺もだ」と言った。それだけで、十分だった。空港で手を振った。泣かなかった。泣けなかった。", "parents": [], "symbols": [], "rank": 57}}, {"data": {"id": "001__070", "generation": "001", "gene_num": "070", "content": "チェスのAIに勝てなくなって十年が経った。でも人間同士の対局は増えている。勝ち負けより、向かいに人がいることが大事なのだとわかった頃、AIも同じことを言い始めた。", "parents": [], "symbols": [], "rank": 58}}, {"data": {"id": "001__071", "generation": "001", "gene_num": "071", "content": "蛇口をひねると血が出る夢を三日続けて見た。四日目、水道管が破裂した。修理業者が言った。「こんな古い管、よく今まで持ちましたね」。夢には何も関係なかったと思いたかった。", "parents": [], "symbols": [], "rank": 59}}, {"data": {"id": "001__072", "generation": "001", "gene_num": "072", "content": "初めて手をつないだのは、遊園地のお化け屋敷の前だった。彼女の手が震えていた。僕も震えていた。でも理由が違った。二人ともそれを知っていた。知らないふりをした。", "parents": [], "symbols": [], "rank": 20}}, {"data": {"id": "001__073", "generation": "001", "gene_num": "073", "content": "何十年もかけて完成した絵がある。誰も知らない。買う人もいない。でも画家は毎朝、それを一時間眺める。「これを見ている時間だけ、私は神様と同じ目をしている」と言った。", "parents": [], "symbols": [], "rank": 21}}, {"data": {"id": "001__074", "generation": "001", "gene_num": "074", "content": "電柱に「ねこさがしています」の張り紙があった。連絡先に電話した。出た声は老人のものだった。猫は見つからなかった。でも毎週木曜日、その老人とお茶を飲む習慣ができた。", "parents": [], "symbols": [], "rank": 60}}, {"data": {"id": "001__075", "generation": "001", "gene_num": "075", "content": "「人生でやり残したことは？」と聞かれた九十歳の男性は、しばらく考えて言った。「全部やった。でも全部やり直したい」。笑い声が病室に広がった。窓から見える空が、夕焼けになった。", "parents": [], "symbols": [], "rank": 61}}, {"data": {"id": "001__076", "generation": "001", "gene_num": "076", "content": "時計職人が死んだ。工房には百台の時計。葬儀の間、すべての時計が止まっていた。埋葬が終わった瞬間、一斉に動き出した。弟子たちは誰も驚かなかった。", "parents": [], "symbols": [], "rank": 16}}, {"data": {"id": "001__077", "generation": "001", "gene_num": "077", "content": "「おやすみ」と言ってから眠れない夜がある。誰に言ったのか、自分でもわからない。でも言った後は、少し楽になる。だから毎晩言う。返事はない。返事は要らない。", "parents": [], "symbols": [], "rank": 34}}, {"data": {"id": "001__078", "generation": "001", "gene_num": "078", "content": "宝くじが当たった。次の日も、その次の日も、同じ生活をした。変えたのは一つだけ。コーヒーを少しいいものにした。それだけで、朝が変わった。朝が変わると、一日が変わった。", "parents": [], "symbols": [], "rank": 62}}, {"data": {"id": "001__079", "generation": "001", "gene_num": "079", "content": "「嫌いな食べ物はなんですか」と聞かれると、いつも困る。嫌いなものより、好きなものを語りたいから。でもそれを言うと話が長くなる。だから黙っている。沈黙も、好きなものの一つだ。", "parents": [], "symbols": [], "rank": 99}}, {"data": {"id": "001__080", "generation": "001", "gene_num": "080", "content": "廃墟になった学校の黒板に、字が書いてあった。「明日また来る」。日付は三十年前だった。誰が書いたのか、なぜ来なかったのかは、今もわからない。来た者は、ここを去れなくなった。", "parents": [], "symbols": [], "rank": 22}}, {"data": {"id": "001__081", "generation": "001", "gene_num": "081", "content": "海に落ちた。溺れかけた。助けてくれたのは、見知らぬ子どもだった。岸に上がって振り返ったとき、子どもはいなかった。浜辺に小さな足跡だけが残り、波に消えた。", "parents": [], "symbols": [], "rank": 63}}, {"data": {"id": "001__082", "generation": "001", "gene_num": "082", "content": "「人を好きになる才能がない」と彼女は言った。でも彼女は毎朝、通勤電車で同じ窓を確保する。そこからだと、桜並木が見える。季節が変わっても、彼女はその席を選ぶ。", "parents": [], "symbols": [], "rank": 93}}, {"data": {"id": "001__083", "generation": "001", "gene_num": "083", "content": "断捨離をしていたら、子どもの頃に描いた絵が出てきた。下手くそな絵。でも構図は大人になった今より大胆だった。捨てられなかった。代わりに、何かを描き始めた。", "parents": [], "symbols": [], "rank": 64}}, {"data": {"id": "001__084", "generation": "001", "gene_num": "084", "content": "コロナで会えなかった二年間。再会したとき、祖母は少し小さくなっていた。「ばあちゃん縮んだ」と言ったら「あんたが大きくなったんだよ」と笑った。また会いに行こうと決めた。", "parents": [], "symbols": [], "rank": 65}}, {"data": {"id": "001__085", "generation": "001", "gene_num": "085", "content": "惑星探査機が送ってきた画像の中に、人の顔があった。偶然の地形だ、と研究者は言った。でもその顔は毎回同じ向き、同じ表情で、こちらを見ていた。笑っていた。", "parents": [], "symbols": [], "rank": 94}}, {"data": {"id": "001__086", "generation": "001", "gene_num": "086", "content": "七回転職した。七回とも「向いていない」と言われた。八回目の面接で「あなたは何が向いていますか」と聞かれた。初めてそれを考えた。答えるのに一週間かかった。採用された。", "parents": [], "symbols": [], "rank": 66}}, {"data": {"id": "001__087", "generation": "001", "gene_num": "087", "content": "「忘れてしまった」と彼は言った。父の声も、母の顔も。でもあの家の台所のにおいだけは、今でも鮮明に覚えている。においだけが、記憶の中で生き続けている。", "parents": [], "symbols": [], "rank": 95}}, {"data": {"id": "001__088", "generation": "001", "gene_num": "088", "content": "誰かに手紙を書こうと便箋を買った。書きたい相手は何人かいた。全員に書いた。全部書いてから気づいた。送りたかったのではなく、書きたかっただけだということに。全部燃やした。", "parents": [], "symbols": [], "rank": 11}}, {"data": {"id": "001__089", "generation": "001", "gene_num": "089", "content": "透明になれる薬を飲んだ。一日だけ。街を歩き回った。気づいたことがある。誰も大して他人を見ていなかった。透明になっても、何も変わらなかった。それが一番怖かった。", "parents": [], "symbols": [], "rank": 12}}, {"data": {"id": "001__090", "generation": "001", "gene_num": "090", "content": "公園のベンチで毎朝、同じ老人が鳩に餌をやっている。冬の寒い日、「風邪ひきますよ」と声をかけた。老人は「鳩が待っているから」と言った。翌朝から、私もそのベンチに座る。", "parents": [], "symbols": [], "rank": 67}}, {"data": {"id": "001__091", "generation": "001", "gene_num": "091", "content": "「バグを直したら新しいバグが出た」とエンジニアが言った。「人生も同じだ」と哲学者が言った。「じゃあ私たちは全員デバッガーだ」とエンジニアが言った。二人は笑った。バグは直っていない。", "parents": [], "symbols": [], "rank": 68}}, {"data": {"id": "001__092", "generation": "001", "gene_num": "092", "content": "夏の終わりに、セミが鳴かなくなる朝がある。その朝は、空気が少し重い。毎年その朝、理由もなく泣けてくる。終わりを知っているのに、いつも驚く。それが夏というものだと思う。", "parents": [], "symbols": [], "rank": 96}}, {"data": {"id": "001__093", "generation": "001", "gene_num": "093", "content": "「私を嫌いな人間がいる」と知ったとき、最初は傷ついた。でも考えてみると、自分も全員を好きなわけではない。それに気づいてから、嫌われることが怖くなくなった。", "parents": [], "symbols": [], "rank": 69}}, {"data": {"id": "001__094", "generation": "001", "gene_num": "094", "content": "呪いの人形を捨てた。三回試みて三回戻ってきた。四回目、引っ越しの荷物の中に入れた。新居でまた戻っていた。五回目、川に流した。川の向こうで、人形が手を振っていた。", "parents": [], "symbols": [], "rank": 25}}, {"data": {"id": "001__095", "generation": "001", "gene_num": "095", "content": "「本が読めない」と若者は言った。「文字を追っても頭に入らない」。司書は一冊渡した。薄くて小さな本だった。一時間後、若者は泣いていた。「全部読めました」。本の題名は「あなたへ」だった。", "parents": [], "symbols": [], "rank": 15}}, {"data": {"id": "001__096", "generation": "001", "gene_num": "096", "content": "ゾンビが溢れた世界で、一軒だけ電気のついた家があった。中を覗くと、老夫婦が将棋をしていた。「逃げなかったの？」と聞くと、夫が言った。「二人でいる場所はここだから」。", "parents": [], "symbols": [], "rank": 6}}, {"data": {"id": "001__097", "generation": "001", "gene_num": "097", "content": "誰かに「頑張れ」と言えなくなった日がある。それ以来「ゆっくりでいいよ」しか言えない。言われた人が泣くことがある。その涙の重さが、正解だったと教えてくれる。", "parents": [], "symbols": [], "rank": 83}}, {"data": {"id": "001__098", "generation": "001", "gene_num": "098", "content": "長い旅を終えて家に帰ると、玄関に誰かの靴があった。泥棒かと思ったが、中から料理のにおいがした。鍵を開けると、死んだはずの兄が台所に立っていた。「腹減ったろ」と言った。", "parents": [], "symbols": [], "rank": 7}}, {"data": {"id": "001__099", "generation": "001", "gene_num": "099", "content": "最後の森が伐採される前夜、木々は一晩中ざわめいた。翌朝、作業員は全員チェーンソーを置いた。理由を聞いても誰も答えなかった。ただ、全員が泣いていた。森はまだそこにある。", "parents": [], "symbols": [], "rank": 10}}, {"data": {"id": "001__100", "generation": "001", "gene_num": "100", "content": "生まれたばかりの赤ちゃんが、初めて笑った。本能だと科学者は言う。でも父親には、確かに「よろしく」と言っているように見えた。「こちらこそ」と言ったら、また笑った。", "parents": [], "symbols": [], "rank": 70}}, {"data": {"id": "002__001", "generation": "002", "gene_num": "001", "content": "家族を守る能力があった。使うたびに記憶が一つ消える。一度だけ使った。妻が倒れた夜に。翌朝、妻は元気だったが、私は彼女の名前を忘れていた。冷蔵庫に妻の字でメモがあった。『私はここにいる』と。", "parents": ["036", "001"], "symbols": ["能力の代償", "冷蔵庫・消えた妻"], "rank": 2}}, {"data": {"id": "002__002", "generation": "002", "gene_num": "002", "content": "ゾンビが溢れた世界で、老いた画家が毎日絵を描いていた。「逃げないの？」と問うと、「三十年描き続けた。今さらやめられない」と言った。翌朝、その人の絵が廃墟の壁を埋め尽くしていた。ゾンビも立ち止まって見ていた。", "parents": ["096", "029"], "symbols": ["ゾンビの世界・老夫婦", "夢を持ち続けた三十年"], "rank": 65}}, {"data": {"id": "002__003", "generation": "002", "gene_num": "003", "content": "百歳の女性に「友達は？」と聞くと、「みんな森になったよ」と言った。葬儀の度に苗木を植えたのだという。彼女の家の庭は、もう立派な森だった。作業員はチェーンソーを持って来たが、置いて帰った。", "parents": ["025", "099"], "symbols": ["百歳の女性・みんないない", "最後の森・チェーンソーを置く"], "rank": 9}}, {"data": {"id": "002__004", "generation": "002", "gene_num": "004", "content": "作家の母が死んだ。形見として残ったのは、未発表の原稿だった。読むべきか迷い、庭で燃やした。煙が空へ昇っていくとき、どこかで嗅いだことのある匂いがした。母が毎朝作っていたみそ汁の匂いだった。", "parents": ["020", "067"], "symbols": ["燃やした原稿・煙", "母の料理・神様の無力"], "rank": 37}}, {"data": {"id": "002__005", "generation": "002", "gene_num": "005", "content": "「幸せとは何か」と問い続けた父が死んだ。葬式の日、ポケットに父のメモがあった。「幸せとは、それを問わずにいられる瞬間のことだ。お前といると、そういう気分だった」。一度も言えなかった言葉が、そこにあった。", "parents": ["010", "040"], "symbols": ["父への感謝が言えなかった", "幸せとは問わずにいられる瞬間"], "rank": 12}}, {"data": {"id": "002__006", "generation": "002", "gene_num": "006", "content": "百歳の植物学者が最後の森を守りに行った。「嫌いな人とは食事をしない」のと同じで、「嫌いな人間が来る場所にはいない」と言っていた。伐採の朝、作業員は全員チェーンソーを置いた。老人はその日から森に帰ってこなかった。", "parents": ["099", "025"], "symbols": ["最後の森・木々のざわめき", "嫌いな人とは食事をしない"], "rank": 99}}, {"data": {"id": "002__007", "generation": "002", "gene_num": "007", "content": "廃校の教室の黒板に「明日また来る」と書いてあった。三十年前の日付だった。その学校の裏に最後の森があった。伐採の朝、作業員は全員チェーンソーを置いて泣いていた。黒板の文字の隣に、誰かが「来てくれた」と書いていた。", "parents": ["080", "099"], "symbols": ["廃墟の黒板・明日また来る", "最後の森・作業員が泣く"], "rank": 87}}, {"data": {"id": "002__008", "generation": "002", "gene_num": "008", "content": "毎朝同じ夢を見る。知らない公園、知らないベンチ、知らない老人が鳩に餌をやっている。ある朝、夢の中の老人が振り向いて言った。「ようやく来たか」。目が覚めたら、近所の公園に出ていた。老人はもうそこにいた。", "parents": ["090", "005"], "symbols": ["公園のベンチ・鳩に餌", "毎日同じ夢・知らない家族"], "rank": 84}}, {"data": {"id": "002__009", "generation": "002", "gene_num": "009", "content": "毎晩夢を見る。母が台所で料理をしている。「早く帰ってきて」と母が言う。目が覚めるたびに、現実が薄れていく。ある朝、夢の中の母が泣きながら言った。「もうここへは来ないで」。その日から夢を見なくなった。", "parents": ["005", "067"], "symbols": ["夢の中の子ども・パパ早く帰って", "母の料理が食べたい"], "rank": 29}}, {"data": {"id": "002__010", "generation": "002", "gene_num": "010", "content": "先生が「好きなものを食べろ」と言った。食べ続けた。三十年。母の味には敵わなかった。でも食べ続けた先生の言葉が、隣にいた。それで十分だったと気づいたのは、先生の訃報と一緒に、一枚のレシピが届いた日だった。", "parents": ["029", "067"], "symbols": ["夢を持ち続けた・先生の訃報", "母の料理・神様にもできない"], "rank": 59}}, {"data": {"id": "002__011", "generation": "002", "gene_num": "011", "content": "廃墟の教会に、神様がいると聞いた。行ってみると誰もいなかった。でも黒板に文字があった。「何か一つだけかなえよう」。迷わず書いた。「もう一度、母の料理が食べたい」。翌朝、黒板は消えていた。台所に匂いだけ残っていた。", "parents": ["080", "067"], "symbols": ["廃墟の黒板・来た者は去れなくなる", "神様・母の料理"], "rank": 41}}, {"data": {"id": "002__012", "generation": "002", "gene_num": "012", "content": "「別れましょう」と彼女は言った。たこ焼きを食べながら。丸い食べ物を前に、丸く収まらない話だ、と言ったら彼女が笑った。その日から十年。父が死んだ日、喪服のポケットに彼女の字があった。「一緒にいてくれてありがとう」。", "parents": ["035", "010"], "symbols": ["たこ焼き・別れ話が流れた", "父のポケットのメモ"], "rank": 58}}, {"data": {"id": "002__013", "generation": "002", "gene_num": "013", "content": "ゾンビが溢れた朝、妻が消えた。靴も財布も残っていた。冷蔵庫の中から声がした。「ここが二人でいる場所だから」。十年分の食材に埋もれた妻は、怒っているというより、ゾンビより少し安全そうだった。", "parents": ["096", "001"], "symbols": ["ゾンビ・老夫婦・二人でいる場所", "消えた妻・冷蔵庫"], "rank": 89}}, {"data": {"id": "002__014", "generation": "002", "gene_num": "014", "content": "夜中に目が覚めると、台所に誰かがいた。兄だった。三年前に死んだはずの。「だれ？」と聞くと、「未来のお前の兄だ」と言った。笑いながら料理を続けた。翌朝、妻が第二子の妊娠を告げた。「名前は兄さんにちなんで」と言った。", "parents": ["098", "023"], "symbols": ["死んだはずの兄・腹減ったろ", "夜中の子ども・未来の子"], "rank": 55}}, {"data": {"id": "002__015", "generation": "002", "gene_num": "015", "content": "ゾンビが溢れた世界で、老小説家が三十年書き続けた原稿を燃やした。煙が空へ昇るのを、夫婦で将棋盤を挟んで見ていた。「逃げなかったの？」と問う声に、妻が答えた。「二人でいる場所には傑作があったから」。", "parents": ["020", "096"], "symbols": ["燃やした原稿・灰になった傑作", "ゾンビ・将棋・二人でいる場所"], "rank": 90}}, {"data": {"id": "002__016", "generation": "002", "gene_num": "016", "content": "ゾンビが溢れた夜、家に帰ると、死んだはずの父が将棋盤の前に座っていた。「逃げなかったの？」と聞くと、「お前が帰ってくる場所が必要だろ」と言った。台所に料理の匂いがした。それだけで十分だった。", "parents": ["096", "098"], "symbols": ["老夫婦・ゾンビ・ここが二人でいる場所", "死んだはずの兄・料理の匂い"], "rank": 74}}, {"data": {"id": "002__017", "generation": "002", "gene_num": "017", "content": "毎晩、夢の中で犬が話しかけてくる。目覚めると言葉は消えている。翻訳機が完成したと聞いて、眠りながら使ってみた。翌朝、記録に残っていた。「一緒にいてくれてありがとう、早く帰ってきて」。犬の言葉か夢の言葉かわからなかった。", "parents": ["005", "043"], "symbols": ["毎日同じ夢・知らない家族", "翻訳機・犬の言葉"], "rank": 53}}, {"data": {"id": "002__018", "generation": "002", "gene_num": "018", "content": "「人生でやり残したことは？」と聞かれた九十歳の男性が言った。「嫌いな人とは食事をしなかった」。それだけです、と。笑い声が病室に広がった。百歳まで生きた彼が最後に言ったのは、「もう一度、みんなと食べたい」だった。", "parents": ["075", "025"], "symbols": ["九十歳の男性・全部やり直したい", "百歳の女性・みんないない"], "rank": 48}}, {"data": {"id": "002__019", "generation": "002", "gene_num": "019", "content": "神様に会った。「何か一つ願いをかなえよう」と言われた。百歳まで生きた祖母の言葉を思い出した。「もう、みんないない」と言っていた。だから願った。「みんなで食べた夜の食卓を、もう一度」。神様は黙って、頷いた。", "parents": ["067", "025"], "symbols": ["神様・母の料理が食べたい", "百歳の女性・みんないない"], "rank": 28}}, {"data": {"id": "002__020", "generation": "002", "gene_num": "020", "content": "公園で毎朝、老人が鳩に餌をやっている。「神様に会ったことがある」と言った。「何かお願いした？」と聞くと、「もう一度、妻の料理が食べたい、と」と言った。「かなったの？」。老人は鳩を見ながら言った。「匂いだけ、今でも」。", "parents": ["067", "090"], "symbols": ["神様・母の料理", "公園のベンチ・鳩に餌・翌朝から私も"], "rank": 44}}, {"data": {"id": "002__021", "generation": "002", "gene_num": "021", "content": "父が死んだ後、実家の犬が何も食べなくなった。翻訳機を試してみた。「ありがとう、ずっと」という言葉が返ってきた。誰に向けた言葉かわからなかった。でもそれは、私が父に言えなかった言葉と、同じだった。", "parents": ["010", "043"], "symbols": ["父への感謝が言えなかった", "翻訳機・犬の言葉"], "rank": 3}}, {"data": {"id": "002__022", "generation": "002", "gene_num": "022", "content": "夜中に目が覚めると、子どもが立っていた。「未来のあなたの子です」と言った。「何かしてあげられることは？」と聞くと、「一分だけ時間を止めてください」と言った。理由は言わなかった。翌朝、妻が事故に遭いかけた。私は間に合った。", "parents": ["023", "036"], "symbols": ["夜中に現れた未来の子", "時間を止める能力・一分縮む"], "rank": 21}}, {"data": {"id": "002__023", "generation": "002", "gene_num": "023", "content": "電柱に「ひとさがしています」の張り紙があった。百歳の老女だった。「迷子になった人がいるの？」と聞くと、「みんないなくなってしまって」と言った。猫は見つからなかった。でも毎週木曜日、一緒にお茶を飲む習慣ができた。", "parents": ["025", "074"], "symbols": ["百歳の女性・みんないない", "猫探し・老人とお茶"], "rank": 49}}, {"data": {"id": "002__024", "generation": "002", "gene_num": "024", "content": "廃墟に一人でしゃべりに行く癖があった。自分の声が嫌いで、誰もいない場所でないと出せなかった。ある日、黒板に自分の声が文字になって残っていた。誰が書いたのかわからない。でもそこへ行くたびに、続きが増えていた。", "parents": ["068", "080"], "symbols": ["自分の声が嫌い・夜明けまでしゃべる", "廃墟の黒板・来た者は去れない"], "rank": 76}}, {"data": {"id": "002__025", "generation": "002", "gene_num": "025", "content": "最後の森が伐採される前夜、一人の女性が森の中で声を出し続けた。自分の声が嫌いだったが、誰もいない森ならよかった。翌朝、作業員は全員チェーンソーを置いた。理由を聞いても誰も答えなかった。ただ、全員が泣いていた。", "parents": ["068", "099"], "symbols": ["自分の声が嫌い・手術前夜", "最後の森・作業員が泣く"], "rank": 77}}, {"data": {"id": "002__026", "generation": "002", "gene_num": "026", "content": "先生が「好きなことをやれ」と言った。やり続けた。三十年。夢は叶わなかった。公園のベンチで毎朝、鳩に餌をやるのが習慣になった。それが先生の言葉の隣にいるようで、十分だった。先生の訃報を聞いたのも、そのベンチだった。", "parents": ["090", "029"], "symbols": ["公園の老人・鳩・私もベンチに", "夢を持ち続けた三十年・先生の訃報"], "rank": 56}}, {"data": {"id": "002__027", "generation": "002", "gene_num": "027", "content": "ゾンビが溢れた世界でも、老人は毎週木曜日に茶を飲んでいた。最初は猫を探していたのが、いつの間にか習慣になった相手と。「逃げないの？」と聞くと、「ここが二人でいる場所だから」と言った。猫はまだ見つかっていない。", "parents": ["096", "074"], "symbols": ["ゾンビ・老夫婦・二人でいる場所", "猫探し・老人とお茶"], "rank": 97}}, {"data": {"id": "002__028", "generation": "002", "gene_num": "028", "content": "夜中に目が覚めると、冷蔵庫の前に子どもが立っていた。「だれ？」と聞くと「未来のあなたの子です」と言った。子どもはすぐ消えた。翌朝、妻が冷蔵庫の中から「整理してよ」と叫んでいた。全部繋がっている気がした。", "parents": ["001", "023"], "symbols": ["消えた妻・冷蔵庫の声", "夜中の子ども・妻の妊娠"], "rank": 70}}, {"data": {"id": "002__029", "generation": "002", "gene_num": "029", "content": "「人生でやり残したことは？」と聞かれた百歳の女性は言った。「全部やった。全部やり直したい」。笑い声が広がった。「では長寿の秘訣は？」と聞くと、しばらく考えて言った。「みんなまだいると思い込み続けること」。", "parents": ["025", "075"], "symbols": ["百歳の女性・みんないない", "全部やった・全部やり直したい"], "rank": 16}}, {"data": {"id": "002__030", "generation": "002", "gene_num": "030", "content": "長い旅を終えて帰ると、台所に料理の匂いがした。夜中に目が覚めると、子どもが立っていた。「未来のあなたの子です」と言った。翌朝、死んだはずの兄が台所に立っていた。「腹減ったろ」と言った。夢かどうか確かめなかった。", "parents": ["098", "023"], "symbols": ["死んだはずの兄・料理の匂い", "夜中の子ども・翌朝の妊娠"], "rank": 75}}, {"data": {"id": "002__031", "generation": "002", "gene_num": "031", "content": "ゾンビが溢れた夜、老夫婦は将棋をしていた。夫は自分の声が嫌いで、いつも黙っていた。妻が「話してよ」と言い続けた三十年だった。その夜初めて、夫は夜明けまで話し続けた。翌朝、ゾンビはいなくなっていた。", "parents": ["096", "068"], "symbols": ["ゾンビ・老夫婦・将棋", "自分の声が嫌い・夜明けまでしゃべる"], "rank": 92}}, {"data": {"id": "002__032", "generation": "002", "gene_num": "032", "content": "「幸せとは何か」を研究した学者が、引退後に公園のベンチで毎朝鳩に餌をやっていた。「答えは出たの？」と聞くと、「今ここにある」と言った。論文は世界中で引用されたが、学者はその後何も書かなかった。私も何も聞かなかった。", "parents": ["040", "090"], "symbols": ["幸せとは問わずにいられる瞬間", "公園の老人・鳩・私もベンチに"], "rank": 11}}, {"data": {"id": "002__033", "generation": "002", "gene_num": "033", "content": "神様に会った。「何か一つ願いをかなえよう」と言われた。「最後の森を残してほしい」と言った。神様は少し困った顔をして、「それだけは、人間にしかできない」と言った。翌朝、作業員は全員チェーンソーを置いていた。", "parents": ["099", "067"], "symbols": ["最後の森・木々のざわめき", "神様・母の料理ができない"], "rank": 42}}, {"data": {"id": "002__034", "generation": "002", "gene_num": "034", "content": "毎晩同じ夢を見る。九十歳の自分が病室のベンチに座って笑っている。「全部やった。全部やり直したい」と言っている。目覚めるたびに現実が薄れていく。ある朝、夢の中の老人が言った。「早く来い。まだ間に合う」。", "parents": ["075", "005"], "symbols": ["九十歳の男性・全部やり直したい", "毎日同じ夢・知らない家族"], "rank": 80}}, {"data": {"id": "002__035", "generation": "002", "gene_num": "035", "content": "ゾンビが溢れた世界で、一人だけ声を失った女性がいた。手術前夜、「二人でいる場所はここだから」と夫に言った最後の言葉だった。ゾンビに囲まれた家の中で、夫は毎晩、妻の代わりに夜明けまで話し続けた。", "parents": ["068", "096"], "symbols": ["自分の声が嫌い・手術前夜", "ゾンビ・老夫婦・二人でいる場所"], "rank": 91}}, {"data": {"id": "002__036", "generation": "002", "gene_num": "036", "content": "ゾンビが溢れた夜、帰ると死んだはずの弟が将棋盤の前に座っていた。「逃げなかったの？」と聞くと、「ここが二人でいる場所だから」と言った。台所に料理の匂いがした。「腹減ったろ」と弟は笑った。それだけで十分だった。", "parents": ["096", "098"], "symbols": ["老夫婦・ゾンビ・ここが二人でいる場所", "死んだはずの兄・腹減ったろ"], "rank": 73}}, {"data": {"id": "002__037", "generation": "002", "gene_num": "037", "content": "毎晩同じ夢を見る。死んだはずの姉が台所に立っていて、知らない家族が食卓を囲んでいる。目覚めるたびに現実が薄れていく。ある朝、夢の中の姉が言った。「腹減ったろ」。その日から夢を見なくなった。匂いだけが残った。", "parents": ["098", "005"], "symbols": ["死んだはずの兄・料理の匂い", "毎日同じ夢・知らない家族"], "rank": 31}}, {"data": {"id": "002__038", "generation": "002", "gene_num": "038", "content": "百歳の女性は、自分の声が好きではなかった。録音すると老いた声がして、こんな声で生きてきたのかと思った。でも毎晩、眠れない夜には、亡くなったみんなの名前を呼び続けた。夜明けまで。それが長寿の秘訣だと思っていた。", "parents": ["025", "068"], "symbols": ["百歳の女性・みんないない", "自分の声が嫌い・夜明けまでしゃべる"], "rank": 46}}, {"data": {"id": "002__039", "generation": "002", "gene_num": "039", "content": "声を失う手術の前夜、翻訳機を犬に向けた。「一緒にいてくれてありがとう、ずっと」と翻訳された。自分の声が嫌いだったのに、その瞬間だけは、声で返事をしたかった。「こちらこそ」と言った。犬はしっぽを振った。", "parents": ["043", "068"], "symbols": ["翻訳機・犬の言葉", "自分の声が嫌い・手術前夜"], "rank": 5}}, {"data": {"id": "002__040", "generation": "002", "gene_num": "040", "content": "「別れましょう」と彼女は言った。たこ焼きを食べながら。その夜、神様に会う夢を見た。「何か一つ願いをかなえよう」と言われた。「彼女の笑顔をもう一度」と言おうとして、「母の料理が食べたい」と言った。目が覚めたら彼女が作っていた。", "parents": ["067", "035"], "symbols": ["神様・母の料理が食べたい", "たこ焼き・別れ話が流れた"], "rank": 95}}, {"data": {"id": "002__041", "generation": "002", "gene_num": "041", "content": "公園で毎朝、老人が鳩に向かって話しかけていた。「自分の声が嫌いで、人とは話せない」と言った。「鳩は？」と聞くと、「返事をしないから」と言った。その日から、私もベンチに座って、何も言わずに鳩を見ることにした。", "parents": ["068", "090"], "symbols": ["自分の声が嫌い・夜明けまでしゃべる", "公園の老人・鳩"], "rank": 100}}, {"data": {"id": "002__042", "generation": "002", "gene_num": "042", "content": "先生が「夢を持て」と言った。三十年持ち続けた。夢は叶わなかった。学者になった友人が言った。「幸せとは、それを問わずにいられる瞬間のことだ」。それを聞いたとき初めて、夢を持っていた三十年間が幸せだったと気づいた。", "parents": ["029", "040"], "symbols": ["夢を持ち続けた三十年", "幸せとは問わずにいられる瞬間"], "rank": 57}}, {"data": {"id": "002__043", "generation": "002", "gene_num": "043", "content": "声を失う前夜、九十歳の父が来た。「全部やった。でも全部やり直したい」と言いながら、夜明けまで話してくれた。自分の声が嫌いだったのに、父の声は好きだった。手術の後、父の声だけが頭の中に残った。", "parents": ["068", "075"], "symbols": ["自分の声が嫌い・声を失う", "九十歳の男性・全部やり直したい"], "rank": 39}}, {"data": {"id": "002__044", "generation": "002", "gene_num": "044", "content": "ゾンビが溢れた世界で、研究者が翻訳機をゾンビに向けた。結果は「一緒にいてくれてありがとう、ずっと」だった。老夫婦は将棋を続けながら、「そうかもしれない」と言った。研究者は泣きながら翻訳機をしまった。", "parents": ["043", "096"], "symbols": ["翻訳機・犬の言葉", "ゾンビ・老夫婦・将棋"], "rank": 61}}, {"data": {"id": "002__045", "generation": "002", "gene_num": "045", "content": "夜中に目が覚めると、子どもが立っていた。「幸せですか？」と聞いてきた。考えたことがなかった。「わからない」と言うと、「その答えが幸せです」と子どもは言って消えた。翌朝、妻が妊娠を告げた。何も考えられなかった。", "parents": ["040", "023"], "symbols": ["幸せとは問わずにいられる瞬間", "夜中の子ども・翌朝の妊娠"], "rank": 27}}, {"data": {"id": "002__046", "generation": "002", "gene_num": "046", "content": "神様に会った。「何か一つ願いをかなえよう」と言われた。百歳の祖母の言葉が浮かんだ。「みんないなくなった」と言っていた。だから言った。「みんながまだいた夜の食卓を」。神様はしばらく考えて、「それならできる」と言った。", "parents": ["025", "067"], "symbols": ["百歳の女性・みんないない", "神様・母の料理"], "rank": 94}}, {"data": {"id": "002__047", "generation": "002", "gene_num": "047", "content": "毎晩同じ夢を見る。知らない家族が食卓を囲んでいる。その中に父がいる。夢の中でも「ありがとう」と言えない。ある朝、夢の父が先に言った。「お前に言えなくてすまなかった」。目が覚めると、夢の記憶が薄れていった。", "parents": ["005", "010"], "symbols": ["毎日同じ夢・知らない家族", "父への感謝が言えなかった"], "rank": 36}}, {"data": {"id": "002__048", "generation": "002", "gene_num": "048", "content": "毎晩現実が薄れていく。夢の中で父が生きている。目が覚めるたびに、父の顔が少しずつ消えていく。ある朝、喪服のポケットに紙切れがあった。父の字で「忘れていい。ただ忘れるな」と書いてあった。", "parents": ["010", "005"], "symbols": ["父のポケットのメモ", "毎日同じ夢・現実が薄れる"], "rank": 22}}, {"data": {"id": "002__049", "generation": "002", "gene_num": "049", "content": "父が生きている間、「ありがとう」と言えなかった。葬式の後、公園のベンチに座っていると、老人が鳩に餌をやっていた。「言えなかった言葉がある」と話すと、老人は黙って餌を渡してくれた。翌朝からそのベンチに座り続けた。", "parents": ["010", "090"], "symbols": ["父への感謝が言えなかった", "公園の老人・鳩・私もベンチに"], "rank": 32}}, {"data": {"id": "002__050", "generation": "002", "gene_num": "050", "content": "廃墟になった実家の黒板に、兄の字で「明日また来る」と書いてあった。日付は三年前、兄が死んだ日だった。翌朝、台所に料理の匂いがした。「腹減ったろ」という声がした。行ってみると、誰もいなかった。匂いだけがあった。", "parents": ["098", "080"], "symbols": ["死んだはずの兄・腹減ったろ", "廃墟の黒板・明日また来る"], "rank": 33}}, {"data": {"id": "002__051", "generation": "002", "gene_num": "051", "content": "毎晩、夢の中で子どもが「パパ早く帰ってきて」と言う。現実の父はもういない。葬式の日、喪服のポケットに紙切れがあった。父の字で「お前に言えなくてすまなかった」と書いてあった。子どもの声と父の字が、重なった。", "parents": ["010", "005"], "symbols": ["父への感謝・葬式のメモ", "夢の中の子ども・パパ早く帰って"], "rank": 35}}, {"data": {"id": "002__052", "generation": "002", "gene_num": "052", "content": "小説家の兄が死んだ。原稿を全部燃やしてほしいという遺言だった。煙が空へ昇るのを見ていると、台所に匂いがした。兄がよく作っていたシチューの匂いだった。振り向くと誰もいなかった。灰の中に、一枚だけ原稿が残っていた。", "parents": ["098", "020"], "symbols": ["死んだはずの兄・料理の匂い", "燃やした原稿・灰になった傑作"], "rank": 64}}, {"data": {"id": "002__053", "generation": "002", "gene_num": "053", "content": "毎晩、夢の中に百歳の祖母が出てくる。大勢の人と食卓を囲んでいる。目覚めるたびに現実が薄れていく。ある朝、夢の祖母が言った。「みんないる。ここには全員いる」。その日から夢を見なくなった。朝が少し寂しくなった。", "parents": ["025", "005"], "symbols": ["百歳の女性・みんないない", "毎日同じ夢・知らない家族"], "rank": 38}}, {"data": {"id": "002__054", "generation": "002", "gene_num": "054", "content": "「ありがとう」と言えなかった。父が生きている間、ずっと。父が死んだ日、冷蔵庫の中に父の字でメモがあった。「いい加減、整理してよ」と書いてあった。笑いながら泣いた。父らしい最後の言葉だった。", "parents": ["010", "001"], "symbols": ["父へのありがとうが言えなかった", "消えた妻・冷蔵庫の声"], "rank": 8}}, {"data": {"id": "002__055", "generation": "002", "gene_num": "055", "content": "ゾンビが溢れた世界で、彼女は「別れましょう」と言った。たこ焼きを食べながら。「二人でいる場所はここだから」と言ったら、彼女が笑った。ゾンビが窓の外を歩いていた。別れ話は流れた。世界の終わりも、流れた。", "parents": ["096", "035"], "symbols": ["ゾンビ・老夫婦・将棋", "たこ焼き・別れ話が流れた"], "rank": 67}}, {"data": {"id": "002__056", "generation": "002", "gene_num": "056", "content": "彼女が「別れましょう」と言ったのは、公園のベンチだった。鳩が足元を歩いていた。丸い食べ物の前じゃないと笑えない、と思っていたら、彼女が鳩に餌をやりはじめた。笑いながら。別れ話は流れた。翌朝からそのベンチに二人でいる。", "parents": ["035", "090"], "symbols": ["たこ焼き・別れ話・彼女が笑った", "公園の老人・鳩・私もベンチに"], "rank": 68}}, {"data": {"id": "002__057", "generation": "002", "gene_num": "057", "content": "電柱に「長寿の秘訣おしえます」という張り紙があった。連絡先に電話すると百歳の女性が出た。訪ねると猫を探していた。猫は見つからなかった。「秘訣は？」と聞くと、「嫌いな人とは食事をしないこと」と言った。お茶を飲んだ。", "parents": ["025", "074"], "symbols": ["百歳の女性・長寿の秘訣", "猫探し・電話・老人とお茶"], "rank": 47}}, {"data": {"id": "002__058", "generation": "002", "gene_num": "058", "content": "父が毎朝、公園で鳩に餌をやっていた。「鳩が待っているから」と言って。父が死んだあと、同じ夢を見る。父がベンチに座っていて、「鳩が待っているから」と言う。目が覚めると公園へ行く。鳩は今日もそこにいる。", "parents": ["090", "005"], "symbols": ["公園の老人・鳩が待っている", "毎日同じ夢・パパ早く帰って"], "rank": 30}}, {"data": {"id": "002__059", "generation": "002", "gene_num": "059", "content": "自分の声が嫌いだった学者が、「幸せとは何か」を研究した。答えを探す間、一人で夜明けまで話し続けた。三十年後に出した答えは一文だった。「それを問わずにいられる瞬間のことである」。その瞬間、声が好きになった。", "parents": ["040", "068"], "symbols": ["幸せとは問わずにいられる瞬間", "自分の声が嫌い・夜明けまでしゃべる"], "rank": 13}}, {"data": {"id": "002__060", "generation": "002", "gene_num": "060", "content": "先生が猫を探していた。訪ねるたびに「まだ見つからない」と言った。三十年通い続けた。猫は見つからなかった。でも先生の言葉が隣にいた。それで十分だったと気づいたのは、先生の訃報と一緒に「猫が帰ってきた」と聞いた日だった。", "parents": ["029", "074"], "symbols": ["夢を持ち続けた先生・先生の訃報", "猫探し・老人とお茶"], "rank": 54}}, {"data": {"id": "002__061", "generation": "002", "gene_num": "061", "content": "毎晩同じ夢を見る。夜中に子どもが立っていて、「未来のあなたの子です」と言う。目覚めるたびに現実が薄れていく。ある夜、夢の中で子どもが言った。「もう来なくていいです。もうすぐ会えるから」。翌朝、妻が妊娠を告げた。", "parents": ["005", "023"], "symbols": ["毎日同じ夢・知らない家族", "夜中に現れた未来の子"], "rank": 26}}, {"data": {"id": "002__062", "generation": "002", "gene_num": "062", "content": "研究者が翻訳機を鳩に向けた。「待っているから来てください」と翻訳された。公園のベンチの老人に教えると、「知ってた」と言った。「毎朝来るから鳩も来るんだ」と。翌朝から私もそのベンチに座る。鳩はすぐ来た。", "parents": ["090", "043"], "symbols": ["公園の老人・鳩が待っている", "翻訳機・犬の言葉"], "rank": 19}}, {"data": {"id": "002__063", "generation": "002", "gene_num": "063", "content": "毎晩夢を見る。知らない子どもが「早く帰ってきて」と言う。現実が薄れていく。ある夜、子どもが立ったまま消えず、こちらを見ていた。「起きないでください」と言った。目が覚めると窓の外が夜明けだった。妻が泣いていた。", "parents": ["005", "023"], "symbols": ["毎日同じ夢・現実が薄れる", "夜中の子・消えた"], "rank": 79}}, {"data": {"id": "002__064", "generation": "002", "gene_num": "064", "content": "翻訳機が完成した夜、夜中に子どもが立っていた。「未来のあなたの子です」と言った。翻訳機を向けると、「一緒にいてくれてありがとう、ずっと」と表示された。子どもは消えた。翌朝、妻が妊娠を告げた。泣きながら笑った。", "parents": ["043", "023"], "symbols": ["翻訳機・犬の言葉", "夜中の子ども・翌朝の妊娠"], "rank": 23}}, {"data": {"id": "002__065", "generation": "002", "gene_num": "065", "content": "九十歳の父が言った。「全部やった。でも全部やり直したい」。笑い声が病室に広がった。その夜、死んだはずの兄が夢に出てきた。「腹減ったろ」と言って料理を作っていた。目が覚めると、窓から見える空が夕焼けになっていた。", "parents": ["075", "098"], "symbols": ["九十歳の男性・全部やり直したい", "死んだはずの兄・腹減ったろ"], "rank": 98}}, {"data": {"id": "002__066", "generation": "002", "gene_num": "066", "content": "廃校のベンチで毎朝、老人が鳩に餌をやっていた。黒板の「明日また来る」を見せると、「私が書いた」と言った。「なぜ来なかったの？」と聞くと、「来てる。三十年」と言った。翌朝から私も来た。鳩も来た。老人も来た。", "parents": ["090", "080"], "symbols": ["公園の老人・鳩・私もベンチに", "廃墟の黒板・明日また来る"], "rank": 85}}, {"data": {"id": "002__067", "generation": "002", "gene_num": "067", "content": "三十年書き続けた原稿を燃やした。翻訳機を火に向けてみた。「一緒にいてくれてありがとう、ずっと」と翻訳された。煙が空へ昇っていくのを見ながら、初めて書けた気がした。灰になった原稿は、誰も読まない最高傑作だった。", "parents": ["020", "043"], "symbols": ["燃やした原稿・灰になった傑作", "翻訳機・犬の言葉"], "rank": 14}}, {"data": {"id": "002__068", "generation": "002", "gene_num": "068", "content": "声を失う手術の前夜、台所に料理の匂いがした。死んだはずの兄だった。「腹減ったろ」と言った。自分の声が嫌いだったのに、その夜だけは、声で何度も呼びかけた。「兄ちゃん」と。手術は成功した。声は消えた。", "parents": ["068", "098"], "symbols": ["自分の声が嫌い・手術前夜", "死んだはずの兄・腹減ったろ"], "rank": 63}}, {"data": {"id": "002__069", "generation": "002", "gene_num": "069", "content": "ゾンビが溢れた世界で、老小説家は三十年書き続けた。「逃げないの？」と聞くと、「ここで書けたから」と言った。ある日、全ての原稿を燃やした。煙が空へ昇るのを夫婦で見ていた。「これが二人でいる場所だ」と夫が言った。", "parents": ["096", "020"], "symbols": ["ゾンビ・老夫婦・二人でいる場所", "燃やした原稿・初めて書けた気がした"], "rank": 96}}, {"data": {"id": "002__070", "generation": "002", "gene_num": "070", "content": "朝、妻が消えた。靴も財布も残ったまま。家中を探し、夜明けまで妻の名前を呼び続けた。自分の声が嫌いだったのに、その夜だけは何度でも呼んだ。夜明けに冷蔵庫の中から声がした。「あなたの声、好きだよ」と。", "parents": ["001", "068"], "symbols": ["消えた妻・冷蔵庫の声", "自分の声が嫌い・夜明けまでしゃべる"], "rank": 7}}, {"data": {"id": "002__071", "generation": "002", "gene_num": "071", "content": "神様に会った。「何か一つ願いをかなえよう」と言われた。翻訳機を差し出した。「これで犬が言った言葉を聞いてください」と。神様は翻訳機を見て、少し困った顔をした。「この言葉は、私にもかなえられない」と言った。", "parents": ["043", "067"], "symbols": ["翻訳機・犬の言葉", "神様・母の料理が食べたい"], "rank": 10}}, {"data": {"id": "002__072", "generation": "002", "gene_num": "072", "content": "「ありがとう」と言えなかった。兄が生きている間、ずっと。長い旅を終えて家に帰ると、台所に兄が立っていた。「腹減ったろ」と言った。「ありがとう」と言った。初めて。兄は「遅い」と笑った。それだけで十分だった。", "parents": ["010", "098"], "symbols": ["父への感謝が言えなかった", "死んだはずの兄・腹減ったろ"], "rank": 6}}, {"data": {"id": "002__073", "generation": "002", "gene_num": "073", "content": "ゾンビが溢れた世界で、研究者が翻訳機を完成させた。老夫婦に使ってみた。夫が妻に向けると「一緒にいてくれてありがとう、ずっと」と表示された。妻が夫に向けると、同じ言葉が出た。研究者は外でゾンビと共に泣いた。", "parents": ["043", "096"], "symbols": ["翻訳機・研究者が泣いた", "ゾンビ・老夫婦"], "rank": 60}}, {"data": {"id": "002__074", "generation": "002", "gene_num": "074", "content": "毎晩同じ夢を見る。ゾンビが溢れた世界で、老夫婦が将棋をしている。目覚めるたびに現実が薄れていく。ある朝、夢の中の老人が振り向いて言った。「ここが二人でいる場所だから、早く来い」。その日から夢を見なくなった。", "parents": ["005", "096"], "symbols": ["毎日同じ夢・知らない家族", "ゾンビ・老夫婦・将棋"], "rank": 82}}, {"data": {"id": "002__075", "generation": "002", "gene_num": "075", "content": "電柱の張り紙を見て電話した。老人が出た。猫は見つからなかった。でも毎週木曜日、公園のベンチでお茶を飲む習慣ができた。老人は鳩に餌をやりながら言った。「鳩が待っているから来る。お前も待っていた」。返事ができなかった。", "parents": ["074", "090"], "symbols": ["猫探し・老人とお茶", "公園の老人・鳩・私もベンチに"], "rank": 45}}, {"data": {"id": "002__076", "generation": "002", "gene_num": "076", "content": "「別れましょう」と彼女は言った。たこ焼きを食べながら。百歳の祖母の言葉を思い出した。「嫌いな人とは食事をしないこと」。嫌いじゃないから一緒に食べているのだ、と言ったら彼女が笑った。別れ話は流れた。", "parents": ["025", "035"], "symbols": ["百歳の女性・嫌いな人とは食事をしない", "たこ焼き・別れ話"], "rank": 66}}, {"data": {"id": "002__077", "generation": "002", "gene_num": "077", "content": "「幸せとは何か」を研究した学者が、退職後に彼女とたこ焼きを食べていた。「別れましょう」と彼女は言った。丸い食べ物の前に、丸く収まらない話。思ったことを言ったら彼女が笑った。別れ話は流れた。答えはここにあった。", "parents": ["035", "040"], "symbols": ["たこ焼き・別れ話が流れた", "幸せとは問わずにいられる瞬間"], "rank": 62}}, {"data": {"id": "002__078", "generation": "002", "gene_num": "078", "content": "百歳の女性が廃校を訪ねていた。黒板に「明日また来る」と書いてあった。三十年前の日付だった。「誰が書いたの？」と聞くと、「みんな、もういない」と言った。女性は白墨を持って、黒板に何かを書いた。それだけで帰った。", "parents": ["080", "025"], "symbols": ["廃墟の黒板・来た者は去れなくなる", "百歳の女性・みんないない"], "rank": 43}}, {"data": {"id": "002__079", "generation": "002", "gene_num": "079", "content": "ゾンビが溢れた世界で、一軒だけ電気のついた家があった。毎晩同じ夢を見る。その家に帰ると、子どもが「パパ早く帰ってきて」と言う。目が覚めるたびに現実が薄れていく。ある朝、その家の前に立っていた。電気がついていた。", "parents": ["005", "096"], "symbols": ["毎日同じ夢・パパ早く帰って", "ゾンビ・電気のついた家"], "rank": 78}}, {"data": {"id": "002__080", "generation": "002", "gene_num": "080", "content": "ゾンビが溢れた夜に「別れましょう」と彼女は言った。たこ焼きを食べながら。「二人でいる場所はここだから」と言ったら彼女が笑った。外ではゾンビが歩いていた。「ここにいよう」と二人で言った。世界は終わらなかった。", "parents": ["096", "035"], "symbols": ["ゾンビ・老夫婦・二人でいる場所", "たこ焼き・別れ話"], "rank": 69}}, {"data": {"id": "002__081", "generation": "002", "gene_num": "081", "content": "廃校の校庭で毎朝、老人が鳩に餌をやっていた。黒板の「明日また来る」を見せると、「私が書いた」と言った。「なぜ来なかったの？」と聞くと、「来てる。三十年」と言った。翌朝から私も来た。鳩も来た。老人も来た。", "parents": ["080", "090"], "symbols": ["廃墟の黒板・明日また来る", "公園の老人・鳩"], "rank": 86}}, {"data": {"id": "002__082", "generation": "002", "gene_num": "082", "content": "「人生でやり残したことは？」と聞かれた百歳の女性は言った。「嫌いな人とは食事をしなかった」。笑い声が広がった。九十歳で死んだ夫も同じことを言っていたと教えると、「だから百年一緒に生きられた」と言った。", "parents": ["025", "075"], "symbols": ["百歳の女性・みんないない", "九十歳・全部やり直したい"], "rank": 15}}, {"data": {"id": "002__083", "generation": "002", "gene_num": "083", "content": "百歳の女性が最後の森を見に行った。「みんな、もういない」と言った。友人たちの話かと思ったら、苗木の話だった。葬儀のたびに植えた木が、今では森になっていた。翌朝、伐採の作業員は全員チェーンソーを置いて帰った。", "parents": ["099", "025"], "symbols": ["最後の森・木々のざわめき", "百歳の女性・みんないない"], "rank": 18}}, {"data": {"id": "002__084", "generation": "002", "gene_num": "084", "content": "夜中に目が覚めると、冷蔵庫の前に子どもが立っていた。「未来のあなたの子です」と言って消えた。翌朝、妻が「いい加減、冷蔵庫を整理してよ」と叫んでいた。少し楽しそうだった。全部繋がっていると思った。", "parents": ["001", "023"], "symbols": ["消えた妻・いい加減整理してよ", "夜中の子ども・翌朝の妊娠"], "rank": 71}}, {"data": {"id": "002__085", "generation": "002", "gene_num": "085", "content": "長い旅を終えて帰ると、公園に兄がいた。死んだはずの。鳩に餌をやっていた。「鳩が待っているから」と言った。「帰ってきたの？」と聞くと、「お前が帰ってくるまで待ってた」と言った。「腹減ったろ」と立ち上がった。", "parents": ["090", "098"], "symbols": ["公園の老人・鳩が待っている", "死んだはずの兄・腹減ったろ"], "rank": 34}}, {"data": {"id": "002__086", "generation": "002", "gene_num": "086", "content": "夜中に目が覚めると、百歳の祖母が立っていた。「だれ？」と聞くと「未来のあなたの祖母です」と言った。「みんないなくなる前に伝えておきたかった」と言って、消えた。翌朝、妻が妊娠を告げた。みんな、また増えていく。", "parents": ["023", "025"], "symbols": ["夜中の子ども・翌朝の妊娠", "百歳の女性・みんないない"], "rank": 52}}, {"data": {"id": "002__087", "generation": "002", "gene_num": "087", "content": "百歳の女性は自分の声が嫌いだった。でも毎晩、亡くなったみんなの名前を呼んだ。夜明けまで。「嫌いな声でも、呼ばなければみんなが本当に消える」と言った。「長寿の秘訣は？」と聞くと、「声を出し続けること」と言った。", "parents": ["068", "025"], "symbols": ["自分の声が嫌い・夜明けまでしゃべる", "百歳の女性・みんないない"], "rank": 17}}, {"data": {"id": "002__088", "generation": "002", "gene_num": "088", "content": "知らない家族の夢を毎晩見る。老夫婦がゾンビに囲まれた家で将棋をしている。「逃げないの？」と夢の中で聞く。夫が振り向いて言う。「お前が来るまで待ってた」。目覚めると涙が出ていた。知らない家族のはずなのに。", "parents": ["005", "096"], "symbols": ["毎日同じ夢・知らない家族", "ゾンビ・老夫婦・二人でいる場所"], "rank": 81}}, {"data": {"id": "002__089", "generation": "002", "gene_num": "089", "content": "声を失う手術の前夜、百歳の祖母に電話した。「嫌いな人とは食事をしない」が秘訣だという祖母に。「声がなくなったら誘えない」と言うと、「来てくれたら食べさせてあげる」と言った。夜明けまで話した。", "parents": ["068", "025"], "symbols": ["声を失う手術・夜明けまでしゃべる", "嫌いな人とは食事をしない"], "rank": 93}}, {"data": {"id": "002__090", "generation": "002", "gene_num": "090", "content": "電柱に「こえさがしています」の張り紙があった。連絡先に電話した。自分の声が嫌いだという老人だった。猫ではなく、自分の声を探していた。声は見つからなかった。でも毎週木曜日、一緒に黙ってお茶を飲む習慣ができた。", "parents": ["074", "068"], "symbols": ["猫探し・老人とお茶", "自分の声が嫌い・夜明けまでしゃべる"], "rank": 51}}, {"data": {"id": "002__091", "generation": "002", "gene_num": "091", "content": "声を失う手術の前夜、九十歳の父が来た。「全部やった。でも全部やり直したい」と言いながら、夜明けまで話してくれた。自分の声が嫌いだったのに、父の声は好きだった。手術の後、父の声だけが頭の中に残った。", "parents": ["075", "068"], "symbols": ["九十歳・全部やり直したい", "自分の声が嫌い・夜明けまでしゃべる"], "rank": 40}}, {"data": {"id": "002__092", "generation": "002", "gene_num": "092", "content": "電柱に「もりさがしています」の張り紙があった。連絡先に電話した。老人が出た。最後の森が伐採されたのだという。森は見つからなかった。でも毎週木曜日、その老人と外でお茶を飲む習慣ができた。木の下で。", "parents": ["099", "074"], "symbols": ["最後の森・木々のざわめき", "猫探し・老人とお茶"], "rank": 50}}, {"data": {"id": "002__093", "generation": "002", "gene_num": "093", "content": "百歳の女性が神様に会った。「何か一つ願いをかなえよう」と言われた。考えて言った。「みんなで食べた夜の食卓をもう一度」。神様はしばらく考えて言った。「みんなとは誰ですか？」。女性は答えられなかった。", "parents": ["067", "025"], "symbols": ["神様・母の料理が食べたい", "百歳の女性・みんないない"], "rank": 24}}, {"data": {"id": "002__094", "generation": "002", "gene_num": "094", "content": "「幸せとは何か」を研究した学者が、ある朝、妻が消えた。靴も財布も残ったまま。冷蔵庫の中から「いい加減、整理してよ」という声がした。十年分の食材に埋もれた妻を見て、学者は思った。これが答えだ、と。", "parents": ["040", "001"], "symbols": ["幸せとは問わずにいられる瞬間", "消えた妻・冷蔵庫の声"], "rank": 83}}, {"data": {"id": "002__095", "generation": "002", "gene_num": "095", "content": "ゾンビが溢れた世界で、二人で将棋をしていた。彼女が「別れましょう」と言った。丸い駒を前に丸く収まらない話だと思ったら彼女が笑った。「ゾンビみたいに続けましょう」と言い直した。将棋はまだ終わっていない。", "parents": ["096", "035"], "symbols": ["ゾンビ・老夫婦・将棋", "たこ焼き・別れ話"], "rank": 88}}, {"data": {"id": "002__096", "generation": "002", "gene_num": "096", "content": "毎晩夢を見る。死んだはずの父が台所に立っている。「腹減ったろ」と言う。目覚めるたびに現実が薄れていく。ある朝、夢の父が言った。「早く帰ってきて」。その日から夢を見なくなった。台所に行くと匂いがした。", "parents": ["098", "005"], "symbols": ["死んだはずの兄・腹減ったろ", "毎日同じ夢・パパ早く帰って"], "rank": 25}}, {"data": {"id": "002__097", "generation": "002", "gene_num": "097", "content": "電柱に「こどもさがしています」の張り紙があった。電話すると老人が出た。夜中に見た子どもの話だという。「未来の誰かの子が来た」と言った。猫のように現れて消えたのだと。その老人と毎週木曜日にお茶を飲む習慣ができた。", "parents": ["023", "074"], "symbols": ["夜中の子ども・翌朝の妊娠", "猫探し・老人とお茶"], "rank": 72}}, {"data": {"id": "002__098", "generation": "002", "gene_num": "098", "content": "時間を止める能力があった。使うたびに、書ける言葉が一つ消える。三十年書き続けた作家は一度だけ使った。原稿を燃やす前の一分間、煙の中に全てを見た。灰になった原稿は、誰も読まない最高傑作だった。", "parents": ["020", "036"], "symbols": ["燃やした原稿・初めて書けた気がした", "時間を止める能力・一分縮む"], "rank": 4}}, {"data": {"id": "002__099", "generation": "002", "gene_num": "099", "content": "時間を止める能力を持つ老人が、毎朝公園で鳩に餌をやっていた。使うたびに自分の時間が一分縮む。「なぜ使うの？」と聞くと、「鳩が飛び立つ前の一分が好きだから」と言った。老人の残り時間はもう、ほとんどなかった。", "parents": ["090", "036"], "symbols": ["公園の老人・鳩が待っている", "時間を止める能力・一分縮む"], "rank": 1}}, {"data": {"id": "002__100", "generation": "002", "gene_num": "100", "content": "夜中に目が覚めると、子どもが立っていた。「未来のあなたの子です」と言った。自分の声が嫌いだったのに、「行かないで」と言った。子どもは消えた。夜明けまでしゃべり続けた。翌朝、妻が妊娠を告げた。声が好きになった。", "parents": ["023", "068"], "symbols": ["夜中の子ども・翌朝の妊娠", "自分の声が嫌い・夜明けまでしゃべる"], "rank": 20}}, {"data": {"id": "003__001", "generation": "003", "gene_num": "001", "content": "声を失う手術の前夜、翻訳機を父に向けた。「ありがとう、ずっと」と翻訳された。自分の声で言えなかった言葉が、機械を通して届いた。手術が終わった後も、父の声だけが頭の中に残った。きっとお互い様だと思った。", "parents": ["091", "021"], "symbols": ["父の声が頭に残る", "犬の翻訳・父への感謝"], "rank": 99}}, {"data": {"id": "003__002", "generation": "003", "gene_num": "002", "content": "時間を止める能力があった。使うたびに書ける言葉が一つ消える。夜中に子どもが立った。「未来のあなたの子です」と言った。「行かないで」と言った。その一言で一つ消えた。翌朝、妻が妊娠を告げた。もう後悔はなかった。", "parents": ["098", "100"], "symbols": ["書く言葉が消える・原稿の灰", "未来の子・声が好きになった"], "rank": 81}}, {"data": {"id": "003__003", "generation": "003", "gene_num": "003", "content": "百歳の女性に「友達は？」と聞くと、「みんな声になったよ」と言った。葬儀の度に録音したのだという。電柱に張り紙がある老人と毎週木曜日に黙ってお茶を飲む。庭の木の間に、古いテープが吊るされていた。", "parents": ["003", "090"], "symbols": ["友達が森になった老女", "声を探す老人・毎週お茶"], "rank": 72}}, {"data": {"id": "003__004", "generation": "003", "gene_num": "004", "content": "声を失う前夜、子どもが夢に立った。「幸せですか？」と聞いてきた。「わからない」と言うと、「その答えが幸せです」と消えた。翌朝、妻が妊娠を告げた。手術の後、父の声と子どもの声だけが頭の中に残った。", "parents": ["045", "043"], "symbols": ["幸せか・翌朝妻が妊娠", "声を失う前夜・父の声が残る"], "rank": 87}}, {"data": {"id": "003__005", "generation": "003", "gene_num": "005", "content": "夜中に子どもが立っていた。「未来のあなたの子です」と言った。「行かないで」と言った。子どもは消えた。翌朝、公園の老人が鳩に餌をやっていた。「残り時間は？」と聞くと、「もうない」と笑った。鳩が飛んだ。", "parents": ["100", "099"], "symbols": ["未来の子・声が好きになった", "鳩が飛ぶ前の一分・老人の残り時間"], "rank": 94}}, {"data": {"id": "003__006", "generation": "003", "gene_num": "006", "content": "父が死んだ後、翻訳機を試した。「ありがとう、ずっと」と返ってきた。電柱に「こえさがしています」の張り紙を見た。連絡した。老人は父と同じ目をしていた。毎週木曜日、一緒に黙ってお茶を飲む習慣ができた。", "parents": ["021", "090"], "symbols": ["犬の翻訳・父への感謝", "声を探す老人・黙ってお茶"], "rank": 19}}, {"data": {"id": "003__007", "generation": "003", "gene_num": "007", "content": "家族を守る能力があった。使うたびに記憶が一つ消える。一度だけ使った。妻が倒れた夜に。目が覚めると喪服のポケットに紙切れがあった。父の字で「忘れていい。ただ忘れるな」。冷蔵庫には妻の字で「私はここにいる」。", "parents": ["001", "048"], "symbols": ["記憶が消える・冷蔵庫のメモ", "夢で父が生きている・喪服のメモ"], "rank": 1}}, {"data": {"id": "003__008", "generation": "003", "gene_num": "008", "content": "神様に会った。「何か一つ願いをかなえよう」と言われた。喪服のポケットの紙切れを差し出した。父の字で「忘れていい。ただ忘れるな」と書いてあった。神様は少し困った顔をした。「この言葉は、私にもかなえられない」。", "parents": ["071", "048"], "symbols": ["神様に翻訳機・かなえられない言葉", "夢で父が生きている・喪服のメモ"], "rank": 2}}, {"data": {"id": "003__009", "generation": "003", "gene_num": "009", "content": "毎晩夢の中で父が生きている。目が覚めるたびに父の顔が少しずつ消えていく。「長寿の秘訣は？」と聞かれた百歳の女性は言った。「みんなまだいると思い込み続けること」。私はその夜から、夢の中で父を呼び続けた。", "parents": ["048", "029"], "symbols": ["夢で父・喪服のメモ", "百歳女性・みんなまだいると思い込む"], "rank": 23}}, {"data": {"id": "003__010", "generation": "003", "gene_num": "010", "content": "声を失う前夜、九十歳の父が来た。「全部やった。でも全部やり直したい」と言いながら夜明けまで話してくれた。手術の後、父の声だけが頭の中に残った。百年生きたとしても、父の声を消すつもりはなかった。", "parents": ["091", "029"], "symbols": ["声を失う手術・父の声が残る", "百歳女性・全部やり直したい"], "rank": 44}}, {"data": {"id": "003__011", "generation": "003", "gene_num": "011", "content": "百歳の女性に「友達は？」と聞くと、「みんな森になったよ」と言った。声を失う前夜、私はその庭に行った。木々の間に、父の声に似た風が吹いていた。手術の後、父の声と森の音だけが頭の中に残った。", "parents": ["003", "091"], "symbols": ["友達が森になった老女", "声を失う手術・父の声が残る"], "rank": 41}}, {"data": {"id": "003__012", "generation": "003", "gene_num": "012", "content": "朝、妻が消えた。靴も財布も残ったまま。百歳の女性の庭まで探しに行った。「ここにいる人は？」と聞くと「みんな森になったよ」と言った。夜明けに冷蔵庫の中から声がした。「あなたの声、好きだよ」と。妻だった。", "parents": ["070", "003"], "symbols": ["妻が消えた・冷蔵庫から声", "友達が森・チェーンソーを置いて帰った"], "rank": 96}}, {"data": {"id": "003__013", "generation": "003", "gene_num": "013", "content": "毎晩同じ夢を見る。子どもが「もうすぐ会えるから」と言う。旅から帰ると、台所に兄が立っていた。「腹減ったろ」と言った。「ありがとう」と言った。初めて。「遅い」と笑った。翌朝、妻が妊娠を告げた。", "parents": ["061", "072"], "symbols": ["毎晩子どもの夢・もうすぐ会える", "兄に初めてありがとう・遅いと笑う"], "rank": 75}}, {"data": {"id": "003__014", "generation": "003", "gene_num": "014", "content": "「人生でやり残したことは？」と聞かれた百歳の女性は言った。「全部やった。全部やり直したい」。夜中に子どもが立っていた。「幸せですか？」と聞いてきた。「全部やり直したい」と言うと、「その答えが幸せです」と消えた。", "parents": ["029", "045"], "symbols": ["百歳女性・全部やり直したい", "幸せか・翌朝妻が妊娠"], "rank": 90}}, {"data": {"id": "003__015", "generation": "003", "gene_num": "015", "content": "電柱に「こえさがしています」の張り紙があっ const COLORS = ["#4e79a7", "#f28e2b", "#e15759", "#76b7b2", "#59a14f", "#edc948", "#b07aa1", "#ff9da7", "#9c755f", "#bab0ac"];

// 世代一覧を収集
const generations = [...new Set(GRAPH_DATA.nodes.map(n => n.data.generation))].sort();

// 世代フィルタ select を構築
const genFilter = document.getElementById('genFilter');
generations.forEach(g => {
  const opt = document.createElement('option');
  opt.value = g;
  opt.textContent = `世代 ${g}`;
  genFilter.appendChild(opt);
});

// 凡例を構築
const legend = document.getElementById('legend');
generations.forEach((g, i) => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<div class="legend-dot" style="background:${COLORS[i % COLORS.length]}"></div><span>${g}</span>`;
  legend.appendChild(item);
});

// 世代インデックスマップ
const genIndex = {};
generations.forEach((g, i) => { genIndex[g] = i; });

// スタイル生成
function nodeStyle(node) {
  const gen = node.data('generation');
  const color = COLORS[genIndex[gen] % COLORS.length];
  const rank = node.data('rank');
  const size = (rank !== null && rank !== undefined && rank <= 20) ? 28 : 18;
  return { 'background-color': color, 'width': size, 'height': size };
}

// Cytoscape 初期化
const cy = cytoscape({
  container: document.getElementById('cy'),
  elements: GRAPH_DATA,
  wheelSensitivity: 0,  // 組み込みのスクロールズームを無効化
  style: [
    {
      selector: 'node',
      style: {
        'width': 18, 'height': 18,
        'label': 'data(gene_num)',
        'font-size': 8,
        'color': '#fff',
        'text-valign': 'center',
        'text-halign': 'center',
        'background-color': ele => COLORS[genIndex[ele.data('generation')] % COLORS.length],
      }
    },
    {
      selector: 'node[rank <= 20]',
      style: { 'width': 28, 'height': 28, 'font-size': 10 }
    },
    {
      selector: 'node:selected',
      style: {
        'border-width': 3,
        'border-color': '#ffd700',
      }
    },
    {
      selector: '.highlighted',
      style: {
        'border-width': 2,
        'border-color': '#90cdf4',
        'opacity': 1,
      }
    },
    {
      selector: '.dimmed',
      style: { 'opacity': 0.15 }
    },
    {
      selector: 'edge',
      style: {
        'width': 1,
        'line-color': '#4a5568',
        'target-arrow-color': '#4a5568',
        'target-arrow-shape': 'triangle',
        'curve-style': 'bezier',
        'arrow-scale': 0.7,
      }
    },
    {
      selector: 'edge.highlighted',
      style: {
        'line-color': '#90cdf4',
        'target-arrow-color': '#90cdf4',
        'width': 2,
        'opacity': 1,
      }
    },
  ],
  layout: {
    name: 'dagre',
    rankDir: 'TB',
    nodeSep: 8,
    rankSep: 1100,
    animate: false,
  }
});

// ノードクリック: 詳細表示 + 祖先・子孫ハイライト
cy.on('tap', 'node', function(evt) {
  const node = evt.target;
  const data = node.data();

  // ハイライトリセット
  cy.elements().removeClass('highlighted dimmed');

  // 祖先・子孫を収集
  const ancestors = node.predecessors();
  const descendants = node.successors();
  const related = ancestors.union(descendants).union(node);
  cy.elements().not(related).addClass('dimmed');
  related.addClass('highlighted');
  node.removeClass('dimmed');

  // サイドパネル更新
  const panel = document.getElementById('panel');
  const symbols = (data.symbols || []).join('、') || '—';
  const parents = (data.parents || []).join(', ') || '—（初期個体）';
  const rankText = (data.rank !== null && data.rank !== undefined) ? `${data.rank} 位` : '—';

  panel.innerHTML = `
    <h2>ノード詳細</h2>
    <div class="field">
      <div class="field-label">世代 / gene_num</div>
      <div class="field-value">世代 ${data.generation} / #${data.gene_num}</div>
    </div>
    <div class="field">
      <div class="field-label">ランク</div>
      <div class="field-value">${rankText}</div>
    </div>
    <div class="field">
      <div class="field-label">親 (前世代)</div>
      <div class="field-value">${parents}</div>
    </div>
    <div class="field">
      <div class="field-label">シンボル</div>
      <div class="field-value">${symbols}</div>
    </div>
    <div class="field">
      <div class="field-label">内容</div>
      <div class="field-value">${data.content}</div>
    </div>
  `;
});

// 背景クリック: リセット
cy.on('tap', function(evt) {
  if (evt.target === cy) {
    cy.elements().removeClass('highlighted dimmed');
    document.getElementById('panel').innerHTML = '<h2>ノード詳細</h2><p class="empty">ノードをクリックしてください</p>';
  }
});

// 世代フィルタ
genFilter.addEventListener('change', function() {
  const val = this.value;
  cy.elements().removeClass('highlighted dimmed');
  if (val === 'all') {
    cy.elements().style('display', 'element');
  } else {
    cy.nodes().forEach(n => {
      n.style('display', n.data('generation') === val ? 'element' : 'none');
    });
    cy.edges().forEach(e => {
      const src = e.source().data('generation') === val;
      const tgt = e.target().data('generation') === val;
      e.style('display', (src && tgt) ? 'element' : 'none');
    });
  }
});

// スクロール操作を乗っ取る:
//   通常スクロール → パン（移動）
//   Ctrl/Cmd + スクロール or ピンチ → ズーム
document.getElementById('cy').addEventListener('wheel', function(e) {
  e.preventDefault();
  e.stopPropagation();
  if (e.ctrlKey || e.metaKey) {
    // ズーム（ピンチも ctrlKey=true で来る）
    const factor = e.deltaY > 0 ? 0.85 : 1.18;
    cy.zoom({
      level: cy.zoom() * factor,
      renderedPosition: { x: e.offsetX, y: e.offsetY }
    });
  } else {
    // パン
    cy.panBy({ x: -e.deltaX * 1.5, y: -e.deltaY * 1.5 });
  }
}, { passive: false, capture: true });

// 表示リセット
document.getElementById('btnReset').addEventListener('click', function() {
  genFilter.value = 'all';
  cy.elements().style('display', 'element');
  cy.elements().removeClass('highlighted dimmed');
  cy.fit();
});
</script>
</body>
</html>
