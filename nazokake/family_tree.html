う", "parents": [], "symbols": [], "rank": 67}}, {"data": {"id": "009__094", "generation": "009", "gene_num": "094", "content": "ピアノとかけまして、上司とときます。その心は、どちらも触れる前に少し間を置く方がうまくいくでしょう", "parents": [], "symbols": [], "rank": 61}}, {"data": {"id": "009__095", "generation": "009", "gene_num": "095", "content": "算数とかけまして、政治家とときます。その心は、どちらも計算が合わないときは誰かのせいにするでしょう", "parents": [], "symbols": [], "rank": 6}}, {"data": {"id": "009__096", "generation": "009", "gene_num": "096", "content": "猫とかけまして、プログラマーとときます。その心は、どちらも箱に入れておけばいいと思われているでしょう", "parents": [], "symbols": [], "rank": 47}}, {"data": {"id": "009__097", "generation": "009", "gene_num": "097", "content": "鏡とかけまして、チャンスとときます。その心は、どちらも正面に立たないと姿が見えないでしょう", "parents": [], "symbols": [], "rank": 60}}, {"data": {"id": "009__098", "generation": "009", "gene_num": "098", "content": "風呂とかけまして、会話とときます。その心は、どちらも入りすぎると頭がぼーっとしてくるでしょう", "parents": [], "symbols": [], "rank": 78}}, {"data": {"id": "009__099", "generation": "009", "gene_num": "099", "content": "猫とかけまして、会話とときます。その心は、どちらも急に無視される理由がわからないでしょう", "parents": [], "symbols": [], "rank": 30}}, {"data": {"id": "009__100", "generation": "009", "gene_num": "100", "content": "算数とかけまして、上司とときます。その心は、どちらも割り算（役割分担）が下手だと誰かが損をするでしょう", "parents": [], "symbols": [], "rank": 100}}], "edges": []};
const COLORS = ["#4e79a7", "#f28e2b", "#e15759", "#76b7b2", "#59a14f", "#edc948", "#b07aa1", "#ff9da7", "#9c755f", "#bab0ac"];

// 世代一覧を収集
const generations = [...new Set(GRAPH_DATA.nodes.map(n => n.data.generation))].sort();

// 世代フィルタ select を構築
const genFilter = document.getElementById('genFilter');
generations.forEach(g => {
  const opt = document.createElement('option');
  opt.value = g;
  opt.textContent = `世代 ${g}`;
  genFilter.appendChild(opt);
});

// 凡例を構築
const legend = document.getElementById('legend');
generations.forEach((g, i) => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<div class="legend-dot" style="background:${COLORS[i % COLORS.length]}"></div><span>${g}</span>`;
  legend.appendChild(item);
});

// 世代インデックスマップ
const genIndex = {};
generations.forEach((g, i) => { genIndex[g] = i; });

// スタイル生成
function nodeStyle(node) {
  const gen = node.data('generation');
  const color = COLORS[genIndex[gen] % COLORS.length];
  const rank = node.data('rank');
  const size = (rank !== null && rank !== undefined && rank <= 20) ? 28 : 18;
  return { 'background-color': color, 'width': size, 'height': size };
}

// Cytoscape 初期化
const cy = cytoscape({
  container: document.getElementById('cy'),
  elements: GRAPH_DATA,
  style: [
    {
      selector: 'node',
      style: {
        'width': 18, 'height': 18,
        'label': 'data(gene_num)',
        'font-size': 8,
        'color': '#fff',
        'text-valign': 'center',
        'text-halign': 'center',
        'background-color': ele => COLORS[genIndex[ele.data('generation')] % COLORS.length],
      }
    },
    {
      selector: 'node[rank <= 20]',
      style: { 'width': 28, 'height': 28, 'font-size': 10 }
    },
    {
      selector: 'node:selected',
      style: {
        'border-width': 3,
        'border-color': '#ffd700',
      }
    },
    {
      selector: '.highlighted',
      style: {
        'border-width': 2,
        'border-color': '#90cdf4',
        'opacity': 1,
      }
    },
    {
      selector: '.dimmed',
      style: { 'opacity': 0.15 }
    },
    {
      selector: 'edge',
      style: {
        'width': 1,
        'line-color': '#4a5568',
        'target-arrow-color': '#4a5568',
        'target-arrow-shape': 'triangle',
        'curve-style': 'bezier',
        'arrow-scale': 0.7,
      }
    },
    {
      selector: 'edge.highlighted',
      style: {
        'line-color': '#90cdf4',
        'target-arrow-color': '#90cdf4',
        'width': 2,
        'opacity': 1,
      }
    },
  ],
  layout: {
    name: 'dagre',
    rankDir: 'TB',
    nodeSep: 25,
    rankSep: 70,
    animate: false,
  }
});

// ノードクリック: 詳細表示 + 祖先・子孫ハイライト
cy.on('tap', 'node', function(evt) {
  const node = evt.target;
  const data = node.data();

  // ハイライトリセット
  cy.elements().removeClass('highlighted dimmed');

  // 祖先・子孫を収集
  const ancestors = node.predecessors();
  const descendants = node.successors();
  const related = ancestors.union(descendants).union(node);
  cy.elements().not(related).addClass('dimmed');
  related.addClass('highlighted');
  node.removeClass('dimmed');

  // サイドパネル更新
  const panel = document.getElementById('panel');
  const symbols = (data.symbols || []).join('、') || '—';
  const parents = (data.parents || []).join(', ') || '—（初期個体）';
  const rankText = (data.rank !== null && data.rank !== undefined) ? `${data.rank} 位` : '—';

  panel.innerHTML = `
    <h2>ノード詳細</h2>
    <div class="field">
      <div class="field-label">世代 / gene_num</div>
      <div class="field-value">世代 ${data.generation} / #${data.gene_num}</div>
    </div>
    <div class="field">
      <div class="field-label">ランク</div>
      <div class="field-value">${rankText}</div>
    </div>
    <div class="field">
      <div class="field-label">親 (前世代)</div>
      <div class="field-value">${parents}</div>
    </div>
    <div class="field">
      <div class="field-label">シンボル</div>
      <div class="field-value">${symbols}</div>
    </div>
    <div class="field">
      <div class="field-label">内容</div>
      <div class="field-value">${data.content}</div>
    </div>
  `;
});

// 背景クリック: リセット
cy.on('tap', function(evt) {
  if (evt.target === cy) {
    cy.elements().removeClass('highlighted dimmed');
    document.getElementById('panel').innerHTML = '<h2>ノード詳細</h2><p class="empty">ノードをクリックしてください</p>';
  }
});

// 世代フィルタ
genFilter.addEventListener('change', function() {
  const val = this.value;
  cy.elements().removeClass('highlighted dimmed');
  if (val === 'all') {
    cy.elements().style('display', 'element');
  } else {
    cy.nodes().forEach(n => {
      n.style('display', n.data('generation') === val ? 'element' : 'none');
    });
    cy.edges().forEach(e => {
      const src = e.source().data('generation') === val;
      const tgt = e.target().data('generation') === val;
      e.style('display', (src && tgt) ? 'element' : 'none');
    });
  }
});

// 表示リセット
document.getElementById('btnReset').addEventListener('click', function() {
  genFilter.value = 'all';
  cy.elements().style('display', 'element');
  cy.elements().removeClass('highlighted dimmed');
  cy.fit();
});
</script>
</body>
</html>
