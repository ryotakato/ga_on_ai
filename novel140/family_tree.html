const GRAPH_DATA = {"nodes": [{"data": {"id": "001__001", "generation": "001", "gene_num": "001", "content": "朝、妻が消えた。靴も財布も残ったまま。警察を呼ぼうとしたとき、冷蔵庫の中から声がした。「いい加減、整理してよ」。十年分の食材に埋もれた彼女は、怒っているというより、少し楽しそうだった。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__002", "generation": "001", "gene_num": "002", "content": "宇宙人が地球に降り立ち、最初に言った言葉は「Wi-Fiのパスワードは？」だった。人類は長い間、宇宙人との会話に備えてきたが、その答えを用意している者は誰もいなかった。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__003", "generation": "001", "gene_num": "003", "content": "深夜の病院で、廊下の突き当たりの部屋だけ電気がついていた。看護師が恐る恐るドアを開けると、老人が一人、将棋を指していた。「誰と？」と聞くと、老人は盤の向こう側を見て微笑んだ。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__004", "generation": "001", "gene_num": "004", "content": "彼女が「好きだ」と言った瞬間、時間が止まった。文字通り止まった。鳥も車も風も。彼女の言葉だけが空気の中に漂い、僕はそれをどうしていいかわからず、ただ立ちつくした。時間は三分後に動き出した。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__005", "generation": "001", "gene_num": "005", "content": "毎日同じ夢を見る。知らない町、知らない家、知らない家族。目覚めるたびに現実が薄れていく。ある朝、夢の中の子どもが言った。「パパ、早く帰ってきて」。その日から夢を見なくなった。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__006", "generation": "001", "gene_num": "006", "content": "哲学者が「木が倒れて誰も聞いていなければ音がするか」と問うた百年後、AIが答えた。「記録しました」。哲学は終わったのか、それとも始まったのか、哲学者たちは今も議論している。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__007", "generation": "001", "gene_num": "007", "content": "猫が急に人間の言葉を話した。「ご飯の量が少ない」。主人は驚きのあまり失神し、目を覚ますとまた普通の猫がいた。しかし皿の上の餌は、確かに少し増えていた。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__008", "generation": "001", "gene_num": "008", "content": "祖母が死ぬ前に言った。「タンスの裏を見なさい」。掘り出したのは古い手紙の束。差出人の名前に覚えはなかったが、筆跡は確かに自分のものだった。日付は、まだ来ていない未来の日だった。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__009", "generation": "001", "gene_num": "009", "content": "無人島に流れ着いた男は、砂浜にメッセージを書いた。三年後、救助されてわかったことがある。同じ砂浜に、同じ文字で、同じメッセージが、自分の筆跡で書かれていた日付が七十年前のものだった。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__010", "generation": "001", "gene_num": "010", "content": "「ありがとう」と言えなかった。父が生きている間、ずっと。葬式の日、喪服のポケットに紙切れがあった。父の字で「お前に言えなくてすまなかった」と書いてあった。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__011", "generation": "001", "gene_num": "011", "content": "ロボットに感情を持たせる実験をした。最初に彼が示した感情は「悲しみ」だった。研究者が理由を聞くと、ロボットは言った。「私には過去がないからです」。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__012", "generation": "001", "gene_num": "012", "content": "会社をクビになった日、財布を落とした。財布を探している間に、空を見上げた。空は青かった。それだけで、なぜか泣けた。泣いたら、少しだけ腹が減ったので、ラーメンを食べた。うまかった。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__013", "generation": "001", "gene_num": "013", "content": "「この薬を飲めば、嫌な記憶が消える」と医者は言った。男は瓶を受け取り、帰り道ずっと考えた。駅のゴミ箱に捨てたのは、嫌な記憶の中に、大切な人の顔があったからだ。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__014", "generation": "001", "gene_num": "014", "content": "亡くなった母の携帯に、今日もメッセージを送る。「元気？」。既読はつかない。でも送り続ける。ある夜、返信が届いた。「元気よ。そっちは？」。電波は、どこまでも届くのかもしれない。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__015", "generation": "001", "gene_num": "015", "content": "地球最後の人間は、図書館で本を読んでいた。外では何も起きていなかった。ただ、静かだった。彼女はそっとページを閉じ、窓の外を見た。誰かに話したい物語が、まだたくさんあった。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__016", "generation": "001", "gene_num": "016", "content": "鏡の中の自分が、一秒だけ遅れて動く日があった。最初は気のせいだと思った。次の日は二秒、その次は三秒。一週間後、鏡の中の自分は別の方向を向いた。そして手を振った。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__017", "generation": "001", "gene_num": "017", "content": "恋人に浮気を告白された夜、大雨が降った。傘を持っていなかったので、ずぶ濡れになって歩いた。どこまでも歩いた。気づいたら夜が明けていた。心は空っぽだったが、体はすっきりしていた。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__018", "generation": "001", "gene_num": "018", "content": "子どもの頃に埋めたタイムカプセルを掘り出した。中には手紙があった。「未来のぼくへ。夢は叶ったか？」。叶っていなかった。でも手紙の最後に一行あった。「どっちでもいいよ」。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__019", "generation": "001", "gene_num": "019", "content": "村に伝わる言い伝えでは、百年に一度、井戸から声が聞こえるという。今年がその年だった。耳を澄ますと、確かに声がした。「助けて」ではなく、「ありがとう」だった。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__020", "generation": "001", "gene_num": "020", "content": "小説家志望の青年は、三十年書き続けて一度も売れなかった。死ぬ間際、原稿を燃やした。煙が空へ昇るのを見て、初めて書けた気がした。灰になった原稿は、誰も読まない最高傑作だった。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__021", "generation": "001", "gene_num": "021", "content": "スーパーのレジで、前に並ぶ老婦人が財布を忘れたと気づいた。後ろに並ぶ男が黙って千円札を出した。婦人が礼を言うと男は「うちの母に似ていたので」と言い、振り返らずに出て行った。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__022", "generation": "001", "gene_num": "022", "content": "AIが詩を書けるようになった日、詩人は引退した。三年後、AIが詩を書かなくなった。理由を尋ねると、「誰も読まないから」と答えた。詩人は静かに机に向かい、また書き始めた。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__023", "generation": "001", "gene_num": "023", "content": "夜中に目が覚めると、部屋の隅に子どもが立っていた。「だれ？」と聞くと「未来のあなたの子です」と言った。子どもはすぐ消えた。翌朝、妻が妊娠を告げた。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__024", "generation": "001", "gene_num": "024", "content": "飛行機が墜落する直前、乗客たちは携帯を取り出した。誰もが同じことをした。電話をかけ、「愛している」と言った。機体は奇跡的に着陸した。空港で誰もが泣いていた理由は、別々だった。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__025", "generation": "001", "gene_num": "025", "content": "百歳の女性に長寿の秘訣を聞いた。「嫌いな人とは食事をしないこと」。記者が追加で聞いた。「では好きな人は？」。女性はしばらく考えて言った。「もう、みんないない」。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__026", "generation": "001", "gene_num": "026", "content": "森の中で道に迷った。スマホも電波もない。パニックになりかけたとき、犬が現れた。ついていくと、一時間後に道路に出た。振り返ったが、犬はいなかった。首輪に見覚えがあった。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__027", "generation": "001", "gene_num": "027", "content": "「死んだらどうなるの」と娘が聞いた。なんと答えればいいかわからなくて黙っていると、娘は言った。「空になるんじゃないかな。空っていっぱいあるから、きっと入れるよ」。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__028", "generation": "001", "gene_num": "028", "content": "地下鉄で眠ってしまい、終点まで乗り過ごした。知らない駅に降りると、小さな本屋があった。手に取った本に、自分の名前が登場人物として書かれていた。著者名は知らない名前だったが、筆跡は自分だった。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__029", "generation": "001", "gene_num": "029", "content": "先生が「夢を持て」と言った。持った。持ち続けた。三十年。夢は叶わなかった。でも夢を持っている間、先生の言葉が隣にいた。それで十分だったと気づいたのは、先生の訃報を聞いた日だった。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__030", "generation": "001", "gene_num": "030", "content": "クローン人間の法律が通った年、一番最初に複製を申請したのは一人の老婆だった。理由を聞くと、「もう一度、子育てがしたい」と答えた。審査官は長い間、申請書を見つめていた。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__031", "generation": "001", "gene_num": "031", "content": "交差点で財布を拾った。中には現金と写真と一枚のメモ。メモには「これを読んでいる人へ。あなたに幸運が訪れますように」と書いてあった。落とし主に届けると、彼女は泣いた。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__032", "generation": "001", "gene_num": "032", "content": "山頂に着いた。風が強かった。疲れた足が痛かった。ガスで何も見えなかった。それでも泣いた。なぜ泣いたのかはわからない。ただ、生きていると思った。それだけだった。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__033", "generation": "001", "gene_num": "033", "content": "子どもの描いた絵が美術館に飾られた。テーマは「かぞく」。父・母・犬・そして見知らぬ女性が描かれていた。誰？と聞くと子どもは言った。「まだ来ていない妹だよ」。半年後、娘が生まれた。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__034", "generation": "001", "gene_num": "034", "content": "戦場カメラマンが引退して写真館を開いた。撮るのは笑顔だけ。ある日、元兵士が訪ねてきた。「笑えないのですが」と言う男を、彼は三時間かけて笑わせた。シャッターを押す手が震えた。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__035", "generation": "001", "gene_num": "035", "content": "タコヤキを食べながら、彼女は「別れましょう」と言った。丸い食べ物を前に、丸く収まらない話をしている、と僕は思った。思ったことを口にしたら、彼女が笑った。別れ話は流れた。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__036", "generation": "001", "gene_num": "036", "content": "時間を止める能力を持って生まれた。でも使うたびに、自分の時間が一分縮む。一度だけ使った。溺れる子どもを助けるために。子どもは大人になり、医者になった。それで十分だった。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__037", "generation": "001", "gene_num": "037", "content": "「本当のことしか言えない呪い」をかけられた男は、最初の日だけ苦しんだ。翌日から、全員に嫌われ始めた。一週間後、一人だけ残った友人が言った。「やっと本音で話せる人間に会えた」。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__038", "generation": "001", "gene_num": "038", "content": "深海に潜る研究者は、毎回同じものを見る。光のない暗闇と、そこに漂う巨大な生物。今回初めて、生物の方から近づいてきた。逃げようとした時、それが手を差し伸べていることに気づいた。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__039", "generation": "001", "gene_num": "039", "content": "定年退職した日、電車で隣に座った老人が言った。「仕事を終えた顔をしている」。どうしてわかるのかと聞くと、「同じ顔をしているから」と笑った。二人でしばらく黙って、窓の外を見た。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__040", "generation": "001", "gene_num": "040", "content": "「幸せとは何か」を研究した学者が、三十年後に出した答えは一文だった。「それを問わずにいられる瞬間のことである」。論文は世界中で引用されたが、学者本人はその後何も書かなかった。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__041", "generation": "001", "gene_num": "041", "content": "夜の公園で泣いている老人がいた。声をかけると「妻が死んで七年、毎晩ここで泣く」と言った。帰り際、老人は言った。「ありがとう。今夜は二人で泣けた」。空が、少し明るくなっていた。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__042", "generation": "001", "gene_num": "042", "content": "眠れない夜、ラジオをつけた。深夜便のDJが言った。「今夜も聴いてくれてありがとう」。スタジオの外、放送局の前に、傘を持った人が一人立っていた。毎晩立っているらしかった。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__043", "generation": "001", "gene_num": "043", "content": "翻訳機が完成した。あらゆる言語を即座に翻訳できる。最初のテストで、犬に向けて使ってみた。翻訳結果は「一緒にいてくれてありがとう、ずっと」だった。研究者は泣いた。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__044", "generation": "001", "gene_num": "044", "content": "同じ日が繰り返される。何度目かわからない。今日も雨、今日も同じニュース、今日も同じ失敗。違ったのは、帰り道の猫が初めて撫でさせてくれたこと。明日は、また違う一日かもしれない。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__045", "generation": "001", "gene_num": "045", "content": "「生まれ変わったら何になりたい？」と聞かれた。即答した。「今の私がいい」。その言葉を口にした瞬間、自分がこんなに今に満足していたとは知らなかった。質問者より自分が一番驚いた。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__046", "generation": "001", "gene_num": "046", "content": "霧の中を歩いていると、前から誰かが歩いてきた。顔がはっきりしない。すれ違う直前、相手が立ち止まった。「また会ったな」と言った。会ったことはない、はずだった。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__047", "generation": "001", "gene_num": "047", "content": "全自動の家で暮らすようになって三年。朝食は作られ、服は選ばれ、音楽が流れる。便利だった。でも、たまに台所に立ちたくなった。焦げた目玉焼きが、無性に食べたかった。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__048", "generation": "001", "gene_num": "048", "content": "校長先生が卒業式で言った。「この学校で一番大切なことを教えてあげよう」。全員が静まり返った。先生は少し間を置いて言った。「それは、ここでは教えられない」。十年後にわかった。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__049", "generation": "001", "gene_num": "049", "content": "初雪の朝、幼い息子が窓の外を見て言った。「神様が消しゴムかけた」。汚れた街が白くなっていた。確かにそうだな、と思いながら、昨日の失敗をいくつか思い出した。消えていた。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__050", "generation": "001", "gene_num": "050", "content": "真夜中の廃病院を探索していたら、手術室の電気がついた。ドアを開けると、手術台に封筒があった。中には写真。写真の中に、今の自分がいた。背後に何かが立っていた。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__051", "generation": "001", "gene_num": "051", "content": "「さようなら」と言えなかった。出発の朝、ただ手を振るだけだった。飛行機が飛び立ってから気づいた。あれは「さようなら」ではなく「また会おう」の手の形だったと。次に会えた。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__052", "generation": "001", "gene_num": "052", "content": "不老不死の薬が完成した。最初の一本は無料で提供された。誰も飲まなかった。理由は様々だった。愛する人より長く生きたくない。終わりがなければ、始まりに意味がない。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__053", "generation": "001", "gene_num": "053", "content": "スマホの電池が切れた。充電器がない。仕方なく、駅で人の顔を見た。本当に久しぶりに見た。みんな、それぞれの目をしていた。画面の中よりずっとにぎやかだった。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__054", "generation": "001", "gene_num": "054", "content": "元カノからメッセージが来た。「あの頃の日記を見つけた。あなたのことを書いた日が一番多かった」。返信を打とうとして、やめた。それだけで十分だと思った。空が夕焼けになっていた。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__055", "generation": "001", "gene_num": "055", "content": "独居老人の部屋の清掃に入った。ゴミ一つない部屋。タンスの上に一冊のノート。開くと、毎日の天気と一言が書いてあった。最後の日付の欄には「今日もいい天気」と書いてあった。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__056", "generation": "001", "gene_num": "056", "content": "コンビニの店員が「いらっしゃいませ」の代わりに「大丈夫ですか？」と言う日がある。気づく人はまれで、気づいた人は決まって少し泣く。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__057", "generation": "001", "gene_num": "057", "content": "月面基地に着任して最初の夜、地球を見た。青くて小さかった。あの星の中に、愛した人たちがいる。手紙を書こうとして気づいた。ポストがないことより、何を書けばいいかがわからなかった。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__058", "generation": "001", "gene_num": "058", "content": "百年後の人間に、今の自分たちは「野蛮だ」と思われるだろうか。千年後には？一万年後には？それでも今の自分たちは懸命に生きていて、それだけは変わらないと思った。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__059", "generation": "001", "gene_num": "059", "content": "夢に出てくる女性に恋をした。現実では会ったことがない。ある日、カフェで彼女を見た。声をかけると、「あなたも夢で会ったことがある」と言った。二人は長い間、黙って向かい合った。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__060", "generation": "001", "gene_num": "060", "content": "嘘をついた。小さな嘘だった。誰も傷つかない嘘のはずだった。でも夜、枕が重かった。翌朝、正直に話した。相手は笑って言った。「知ってたよ。でも黙ってた」。どちらが重かったか。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__061", "generation": "001", "gene_num": "061", "content": "宇宙から戻ると、地球の色が違って見えた。緑が濃い。空が深い。妻の目が、前より大きく見えた。「変わったね」と妻は言った。「変わってないのは君だけだ」と答えた。それが一番嬉しかった。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__062", "generation": "001", "gene_num": "062", "content": "日本語がわからない旅人が、道に迷って泣いていた。私は英語が話せない。二人で地図を広げ、指を指し合い、三十分かけて彼を目的地まで連れて行った。別れ際、握手した手が温かかった。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__063", "generation": "001", "gene_num": "063", "content": "「怒ることをやめた」と友人は言った。一年後、友人は笑わなくなった。喜ぶことも泣くこともなくなった。「感情は全部つながっているんだ」と友人は言った。今は、怒っている。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__064", "generation": "001", "gene_num": "064", "content": "図書館で同じ本を借り続ける少年がいた。司書が理由を聞くと「貸出カードに好きな人の名前があるから」と言った。司書は次の貸出カードに、こっそりその少年の名前を入れた。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__065", "generation": "001", "gene_num": "065", "content": "大人になって初めてジェットコースターに乗った。怖くなかった。子どもの頃は怖かったのに。どこで怖さを忘れたのか、どこで勇気が生まれたのかはわからない。次の列に並びながら、泣いていた。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__066", "generation": "001", "gene_num": "066", "content": "壁に耳あり、障子に目あり。それを知った上で、夫婦は喧嘩する。全部筒抜けの長屋暮らし。怒鳴り声の後に笑い声。隣の田中さんが言った。「今日もよかった。ドラマより面白い」。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__067", "generation": "001", "gene_num": "067", "content": "神様に会った。「何か一つ願いをかなえよう」と言われた。考えた末に言った。「もう一度、母の料理が食べたい」。神様は少し困った顔をして、「それだけは私にもできない」と言った。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__068", "generation": "001", "gene_num": "068", "content": "自分の声が嫌いだった。録音して聞くたびに、こんな声で生きているのかと思った。末期がんで声を失う手術を受ける前夜、枕に向かって一人でしゃべり続けた。夜明けまで。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__069", "generation": "001", "gene_num": "069", "content": "親友が海外に移住した。最後の夜、二人で酒を飲んだ。「さびしい」と言ったら「俺もだ」と言った。それだけで、十分だった。空港で手を振った。泣かなかった。泣けなかった。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__070", "generation": "001", "gene_num": "070", "content": "チェスのAIに勝てなくなって十年が経った。でも人間同士の対局は増えている。勝ち負けより、向かいに人がいることが大事なのだとわかった頃、AIも同じことを言い始めた。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__071", "generation": "001", "gene_num": "071", "content": "蛇口をひねると血が出る夢を三日続けて見た。四日目、水道管が破裂した。修理業者が言った。「こんな古い管、よく今まで持ちましたね」。夢には何も関係なかったと思いたかった。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__072", "generation": "001", "gene_num": "072", "content": "初めて手をつないだのは、遊園地のお化け屋敷の前だった。彼女の手が震えていた。僕も震えていた。でも理由が違った。二人ともそれを知っていた。知らないふりをした。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__073", "generation": "001", "gene_num": "073", "content": "何十年もかけて完成した絵がある。誰も知らない。買う人もいない。でも画家は毎朝、それを一時間眺める。「これを見ている時間だけ、私は神様と同じ目をしている」と言った。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__074", "generation": "001", "gene_num": "074", "content": "電柱に「ねこさがしています」の張り紙があった。連絡先に電話した。出た声は老人のものだった。猫は見つからなかった。でも毎週木曜日、その老人とお茶を飲む習慣ができた。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__075", "generation": "001", "gene_num": "075", "content": "「人生でやり残したことは？」と聞かれた九十歳の男性は、しばらく考えて言った。「全部やった。でも全部やり直したい」。笑い声が病室に広がった。窓から見える空が、夕焼けになった。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__076", "generation": "001", "gene_num": "076", "content": "時計職人が死んだ。工房には百台の時計。葬儀の間、すべての時計が止まっていた。埋葬が終わった瞬間、一斉に動き出した。弟子たちは誰も驚かなかった。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__077", "generation": "001", "gene_num": "077", "content": "「おやすみ」と言ってから眠れない夜がある。誰に言ったのか、自分でもわからない。でも言った後は、少し楽になる。だから毎晩言う。返事はない。返事は要らない。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__078", "generation": "001", "gene_num": "078", "content": "宝くじが当たった。次の日も、その次の日も、同じ生活をした。変えたのは一つだけ。コーヒーを少しいいものにした。それだけで、朝が変わった。朝が変わると、一日が変わった。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__079", "generation": "001", "gene_num": "079", "content": "「嫌いな食べ物はなんですか」と聞かれると、いつも困る。嫌いなものより、好きなものを語りたいから。でもそれを言うと話が長くなる。だから黙っている。沈黙も、好きなものの一つだ。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__080", "generation": "001", "gene_num": "080", "content": "廃墟になった学校の黒板に、字が書いてあった。「明日また来る」。日付は三十年前だった。誰が書いたのか、なぜ来なかったのかは、今もわからない。来た者は、ここを去れなくなった。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__081", "generation": "001", "gene_num": "081", "content": "海に落ちた。溺れかけた。助けてくれたのは、見知らぬ子どもだった。岸に上がって振り返ったとき、子どもはいなかった。浜辺に小さな足跡だけが残り、波に消えた。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__082", "generation": "001", "gene_num": "082", "content": "「人を好きになる才能がない」と彼女は言った。でも彼女は毎朝、通勤電車で同じ窓を確保する。そこからだと、桜並木が見える。季節が変わっても、彼女はその席を選ぶ。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__083", "generation": "001", "gene_num": "083", "content": "断捨離をしていたら、子どもの頃に描いた絵が出てきた。下手くそな絵。でも構図は大人になった今より大胆だった。捨てられなかった。代わりに、何かを描き始めた。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__084", "generation": "001", "gene_num": "084", "content": "コロナで会えなかった二年間。再会したとき、祖母は少し小さくなっていた。「ばあちゃん縮んだ」と言ったら「あんたが大きくなったんだよ」と笑った。また会いに行こうと決めた。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__085", "generation": "001", "gene_num": "085", "content": "惑星探査機が送ってきた画像の中に、人の顔があった。偶然の地形だ、と研究者は言った。でもその顔は毎回同じ向き、同じ表情で、こちらを見ていた。笑っていた。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__086", "generation": "001", "gene_num": "086", "content": "七回転職した。七回とも「向いていない」と言われた。八回目の面接で「あなたは何が向いていますか」と聞かれた。初めてそれを考えた。答えるのに一週間かかった。採用された。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__087", "generation": "001", "gene_num": "087", "content": "「忘れてしまった」と彼は言った。父の声も、母の顔も。でもあの家の台所のにおいだけは、今でも鮮明に覚えている。においだけが、記憶の中で生き続けている。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__088", "generation": "001", "gene_num": "088", "content": "誰かに手紙を書こうと便箋を買った。書きたい相手は何人かいた。全員に書いた。全部書いてから気づいた。送りたかったのではなく、書きたかっただけだということに。全部燃やした。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__089", "generation": "001", "gene_num": "089", "content": "透明になれる薬を飲んだ。一日だけ。街を歩き回った。気づいたことがある。誰も大して他人を見ていなかった。透明になっても、何も変わらなかった。それが一番怖かった。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__090", "generation": "001", "gene_num": "090", "content": "公園のベンチで毎朝、同じ老人が鳩に餌をやっている。冬の寒い日、「風邪ひきますよ」と声をかけた。老人は「鳩が待っているから」と言った。翌朝から、私もそのベンチに座る。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__091", "generation": "001", "gene_num": "091", "content": "「バグを直したら新しいバグが出た」とエンジニアが言った。「人生も同じだ」と哲学者が言った。「じゃあ私たちは全員デバッガーだ」とエンジニアが言った。二人は笑った。バグは直っていない。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__092", "generation": "001", "gene_num": "092", "content": "夏の終わりに、セミが鳴かなくなる朝がある。その朝は、空気が少し重い。毎年その朝、理由もなく泣けてくる。終わりを知っているのに、いつも驚く。それが夏というものだと思う。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__093", "generation": "001", "gene_num": "093", "content": "「私を嫌いな人間がいる」と知ったとき、最初は傷ついた。でも考えてみると、自分も全員を好きなわけではない。それに気づいてから、嫌われることが怖くなくなった。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__094", "generation": "001", "gene_num": "094", "content": "呪いの人形を捨てた。三回試みて三回戻ってきた。四回目、引っ越しの荷物の中に入れた。新居でまた戻っていた。五回目、川に流した。川の向こうで、人形が手を振っていた。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__095", "generation": "001", "gene_num": "095", "content": "「本が読めない」と若者は言った。「文字を追っても頭に入らない」。司書は一冊渡した。薄くて小さな本だった。一時間後、若者は泣いていた。「全部読めました」。本の題名は「あなたへ」だった。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__096", "generation": "001", "gene_num": "096", "content": "ゾンビが溢れた世界で、一軒だけ電気のついた家があった。中を覗くと、老夫婦が将棋をしていた。「逃げなかったの？」と聞くと、夫が言った。「二人でいる場所はここだから」。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__097", "generation": "001", "gene_num": "097", "content": "誰かに「頑張れ」と言えなくなった日がある。それ以来「ゆっくりでいいよ」しか言えない。言われた人が泣くことがある。その涙の重さが、正解だったと教えてくれる。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__098", "generation": "001", "gene_num": "098", "content": "長い旅を終えて家に帰ると、玄関に誰かの靴があった。泥棒かと思ったが、中から料理のにおいがした。鍵を開けると、死んだはずの兄が台所に立っていた。「腹減ったろ」と言った。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__099", "generation": "001", "gene_num": "099", "content": "最後の森が伐採される前夜、木々は一晩中ざわめいた。翌朝、作業員は全員チェーンソーを置いた。理由を聞いても誰も答えなかった。ただ、全員が泣いていた。森はまだそこにある。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "001__100", "generation": "001", "gene_num": "100", "content": "生まれたばかりの赤ちゃんが、初めて笑った。本能だと科学者は言う。でも父親には、確かに「よろしく」と言っているように見えた。「こちらこそ」と言ったら、また笑った。", "parents": [], "symbols": [], "rank": null}}, {"data": {"id": "002__001", "generation": "002", "gene_num": "001", "content": "百歳の女性の葬儀の日、記者が書いたメモが見つかった。「嫌いな人とは食事をしない」というあの言葉の横に、小さく「孤独という名の長寿」と書き添えてあった。", "parents": ["025", "055"], "symbols": [], "rank": null}}, {"data": {"id": "002__002", "generation": "002", "gene_num": "002", "content": "司書が定年退職した。最後の日、貸出カードを一枚一枚めくった。同じ本を三十年借り続けた人がいた。名前は変わらなかった。ただ、筆跡だけが子どもから大人になっていた。", "parents": ["064", "055"], "symbols": [], "rank": null}}, {"data": {"id": "002__003", "generation": "002", "gene_num": "003", "content": "翻訳機を犬に向けると「一緒にいてくれてありがとう」と出た。死んだ父の日記を翻訳機にかざしたとき、同じ言葉が表示された。機械が壊れているのか、と研究者は思った。", "parents": ["043", "010"], "symbols": [], "rank": null}}, {"data": {"id": "002__004", "generation": "002", "gene_num": "004", "content": "「本当のことしか言えない呪い」をかけられた男は、犬に話しかけた。犬は翻訳機なしでも尻尾を振った。嘘をつ const COLORS = ["#4e79a7", "#f28e2b", "#e15759", "#76b7b2", "#59a14f", "#edc948", "#b07aa1", "#ff9da7", "#9c755f", "#bab0ac"];

// 世代一覧を収集
const generations = [...new Set(GRAPH_DATA.nodes.map(n => n.data.generation))].sort();

// 世代フィルタ select を構築
const genFilter = document.getElementById('genFilter');
generations.forEach(g => {
  const opt = document.createElement('option');
  opt.value = g;
  opt.textContent = `世代 ${g}`;
  genFilter.appendChild(opt);
});

// 凡例を構築
const legend = document.getElementById('legend');
generations.forEach((g, i) => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<div class="legend-dot" style="background:${COLORS[i % COLORS.length]}"></div><span>${g}</span>`;
  legend.appendChild(item);
});

// 世代インデックスマップ
const genIndex = {};
generations.forEach((g, i) => { genIndex[g] = i; });

// スタイル生成
function nodeStyle(node) {
  const gen = node.data('generation');
  const color = COLORS[genIndex[gen] % COLORS.length];
  const rank = node.data('rank');
  const size = (rank !== null && rank !== undefined && rank <= 20) ? 28 : 18;
  return { 'background-color': color, 'width': size, 'height': size };
}

// Cytoscape 初期化
const cy = cytoscape({
  container: document.getElementById('cy'),

  cy.elements().removeClass('highlighted dimmed');

  // 祖先・子孫を収集
  const ancestors = node.predecessors();
  const descendants = node.successors();
  const related = ancestors.union(descendants).union(node);
  cy.elements().not(related).addClass('dimmed');
  related.addClass('highlighted');
  node.removeClass('dimmed');

  // サイドパネル更新
  const panel = document.getElementById('panel');
  const symbols = (data.symbols || []).join('、') || '—';
  const parents = (data.parents || []).join(', ') || '—（初期個体）';
  const rankText = (data.rank !== null && data.rank !== undefined) ? `${data.rank} 位` : '—';

  panel.innerHTML = `
    <h2>ノード詳細</h2>
    <div class="field">
      <div class="field-label">世代 / gene_num</div>
      <div class="field-value">世代 ${data.generation} / #${data.gene_num}</div>
    </div>
    <div class="field">
      <div class="field-label">ランク</div>
      <div class="field-value">${rankText}</div>
    </div>
    <div class="field">
      <div class="field-label">親 (前世代)</div>
      <div class="field-value">${parents}</div>
    </div>
    <div class="field">
      <div class="field-label">シンボル</div>
      <div class="field-value">${symbols}</div>
    </div>
    <div class="field">
      <div class="field-label">内容</div>
      <div class="field-value">${data.content}</div>
    </div>
  `;
});

// 背景クリック: リセット
cy.on('tap', function(evt) {
  if (evt.target === cy) {
    cy.elements().removeClass('highlighted dimmed');
    document.getElementById('panel').innerHTML = '<h2>ノード詳細</h2><p class="empty">ノードをクリックしてください</p>';
  }
});

// 世代フィルタ
genFilter.addEventListener('change', function() {
  const val = this.value;
  cy.elements().removeClass('highlighted dimmed');
  if (val === 'all') {
    cy.elements().style('display', 'element');
  } else {
    cy.nodes().forEach(n => {
      n.style('display', n.data('generation') === val ? 'element' : 'none');
    });
    cy.edges().forEach(e => {
      const src = e.source().data('generation') === val;
      const tgt = e.target().data('generation') === val;
      e.style('display', (src && tgt) ? 'element' : 'none');
    });
  }
});

// 表示リセット
document.getElementById('btnReset').addEventListener('click', function() {
  genFilter.value = 'all';
  cy.elements().style('display', 'element');
  cy.elements().removeClass('highlighted dimmed');
  cy.fit();
});
</script>
</body>
</html>
